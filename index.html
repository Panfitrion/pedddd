<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panfitrión — Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --negro: #0a0a0a;
    --negro2: #111111;
    --negro3: #1a1a1a;
    --negro4: #222222;
    --gris1: #2a2a2a;
    --gris2: #3a3a3a;
    --gris3: #555555;
    --gris4: #888888;
    --gris5: #aaaaaa;
    --dorado: #c9a84c;
    --dorado2: #b8963c;
    --dorado3: #e8c97a;
    --blanco: #f5f2eb;
    --blanco2: #e8e4db;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--negro);
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--negro2);
    border-bottom: 1px solid var(--gris1);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .logo-wrap {
    position: relative;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .logo-wrap img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    display: none;
  }

  .logo-placeholder {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--dorado);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--negro);
  }

  .header-titles {
    min-width: 0;
  }

  .marca-nombre {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--dorado);
    line-height: 1.1;
  }

  .cafe-nombre {
    font-size: 12px;
    color: var(--gris4);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  .btn-historial {
    background: var(--gris1);
    border: 1px solid var(--gris2);
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .btn-historial:active { background: var(--gris2); }

  /* ── MAIN ── */
  .main {
    padding: 20px 16px 120px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── CALENDARIO ── */
  .calendario-section {
    margin-bottom: 24px;
  }

  .section-label {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--dorado);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .calendario {
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 14px;
    overflow: hidden;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--gris1);
  }

  .cal-mes {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--blanco);
    text-transform: capitalize;
  }

  .cal-nav {
    background: none;
    border: none;
    color: var(--gris4);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    transition: color 0.15s;
    line-height: 1;
  }

  .cal-nav:active { color: var(--dorado); }

  .cal-semana {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 10px 8px 4px;
    gap: 2px;
  }

  .cal-dia-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--gris3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 4px 8px 12px;
    gap: 4px;
  }

  .cal-dia {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    border: 1.5px solid transparent;
    color: var(--blanco);
    -webkit-user-select: none;
    user-select: none;
  }

  .cal-dia.vacio { cursor: default; }

  .cal-dia.pasado {
    color: var(--gris2);
    cursor: not-allowed;
  }

  .cal-dia.hoy {
    color: var(--dorado);
    font-weight: 700;
  }

  .cal-dia.hoy::after {
    content: '';
    position: absolute;
    bottom: 3px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--dorado);
  }

  .cal-dia.con-pedido {
    border-color: rgba(201,168,76,0.3);
    cursor: not-allowed;
    color: var(--gris4);
  }

  .cal-dia.seleccionado {
    background: var(--dorado);
    color: var(--negro) !important;
    font-weight: 700;
    border-color: transparent;
  }

  .cal-dia.seleccionado::after { display: none; }

  .cal-dia:not(.pasado):not(.con-pedido):not(.vacio):not(.seleccionado):active {
    background: var(--gris1);
  }

  .entrega-texto {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    font-size: 13px;
    color: var(--dorado3);
    text-align: center;
    font-weight: 500;
    display: none;
  }

  /* ── PRODUCTOS ── */
  .productos-section {
    margin-bottom: 24px;
  }

  .sucursal-bloque {
    margin-bottom: 16px;
  }

  .sucursal-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--gris1);
  }

  .sucursal-punto {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--dorado);
    flex-shrink: 0;
  }

  .sucursal-nombre {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--blanco);
    flex: 1;
  }

  .sucursal-total {
    font-size: 12px;
    color: var(--gris4);
    font-weight: 500;
  }

  .sucursal-total span {
    color: var(--dorado);
    font-weight: 600;
  }

  .producto-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 10px;
    margin-bottom: 6px;
    gap: 12px;
  }

  .producto-nombre {
    font-size: 14px;
    font-weight: 400;
    color: var(--blanco);
    flex: 1;
    min-width: 0;
  }

  .cantidad-ctrl {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--negro4);
    border: 1px solid var(--gris2);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .btn-cant {
    background: none;
    border: none;
    color: var(--dorado);
    font-size: 20px;
    font-weight: 300;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    line-height: 1;
  }

  .btn-cant:active { background: var(--gris1); }

  .cant-num {
    min-width: 34px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--blanco);
    cursor: pointer;
    padding: 0 2px;
  }

  .cant-num.activo {
    color: var(--dorado);
  }

  /* ── NOTAS ── */
  .notas-section {
    margin-bottom: 24px;
  }

  .notas-textarea {
    width: 100%;
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 10px;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    resize: none;
    min-height: 80px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  .notas-textarea:focus {
    border-color: var(--dorado);
  }

  .notas-textarea::placeholder { color: var(--gris3); }

  /* ── BARRA STICKY ENVÍO ── */
  .barra-envio {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 12px 16px max(12px, env(safe-area-inset-bottom));
    background: var(--negro2);
    border-top: 1px solid var(--gris1);
    display: flex;
    align-items: center;
    gap: 12px;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    max-width: 100%;
  }

  .barra-envio.visible {
    transform: translateY(0);
  }

  .barra-total {
    flex: 1;
    min-width: 0;
  }

  .barra-total-label {
    font-size: 11px;
    color: var(--gris4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .barra-total-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--dorado);
    line-height: 1.1;
  }

  .barra-total-num span {
    font-size: 13px;
    color: var(--gris4);
    font-weight: 400;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-confirmar {
    background: var(--dorado);
    border: none;
    color: var(--negro);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-confirmar:active { background: var(--dorado2); }
  .btn-confirmar:disabled {
    background: var(--gris2);
    color: var(--gris4);
    cursor: not-allowed;
  }

  /* ── TECLADO NUMÉRICO ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .teclado-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 300;
    background: var(--negro2);
    border-top: 1px solid var(--gris1);
    border-radius: 20px 20px 0 0;
    padding: 16px 16px max(20px, env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-width: 480px;
    margin: 0 auto;
  }

  .teclado-sheet.visible {
    transform: translateY(0);
  }

  .teclado-handle {
    width: 36px;
    height: 4px;
    background: var(--gris2);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .teclado-producto {
    text-align: center;
    font-size: 12px;
    color: var(--gris4);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .teclado-display {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--blanco);
    line-height: 1;
    margin-bottom: 20px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .teclado-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }

  .teclado-btn {
    background: var(--gris1);
    border: none;
    color: var(--blanco);
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    height: 60px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .teclado-btn:active { background: var(--gris2); }

  .teclado-btn.borrar {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    color: var(--gris4);
  }

  .teclado-btn.cero { grid-column: span 2; }

  .btn-teclado-ok {
    width: 100%;
    background: var(--dorado);
    border: none;
    color: var(--negro);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    height: 54px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-teclado-ok:active { background: var(--dorado2); }

  /* ── MODAL ÉXITO ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal-card {
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 360px;
    transform: scale(0.9);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    text-align: center;
  }

  .modal-overlay.visible .modal-card {
    transform: scale(1);
  }

  .modal-icono {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(201,168,76,0.12);
    border: 2px solid var(--dorado);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
  }

  .modal-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--blanco);
    margin-bottom: 8px;
  }

  .modal-subtitulo {
    font-size: 14px;
    color: var(--gris4);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .modal-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-whatsapp {
    background: #1a7a3a;
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 20px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
  }

  .btn-whatsapp:active { background: #145e2b; }

  .btn-cerrar-modal {
    background: var(--gris1);
    border: 1px solid var(--gris2);
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-cerrar-modal:active { background: var(--gris2); }

  /* ── DRAWER HISTORIAL ── */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .drawer-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 300;
    background: var(--negro2);
    border-top: 1px solid var(--gris1);
    border-radius: 20px 20px 0 0;
    max-height: 80dvh;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-width: 480px;
    margin: 0 auto;
  }

  .drawer.visible {
    transform: translateY(0);
  }

  .drawer-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--gris1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .drawer-handle {
    width: 36px;
    height: 4px;
    background: var(--gris2);
    border-radius: 2px;
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
  }

  .drawer-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--blanco);
  }

  .btn-cerrar-drawer {
    background: var(--gris1);
    border: none;
    color: var(--gris4);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .drawer-content {
    overflow-y: auto;
    padding: 16px;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }

  .historial-vacio {
    text-align: center;
    padding: 40px 20px;
    color: var(--gris4);
    font-size: 14px;
  }

  .pedido-card {
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .pedido-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .pedido-fecha-envio {
    font-size: 11px;
    color: var(--gris4);
  }

  .pedido-fecha-entrega {
    font-size: 12px;
    font-weight: 600;
    color: var(--dorado);
    background: rgba(201,168,76,0.1);
    padding: 3px 8px;
    border-radius: 6px;
  }

  .pedido-productos {
    font-size: 13px;
    color: var(--blanco);
    line-height: 1.7;
  }

  .pedido-sucursal-nombre {
    font-size: 11px;
    color: var(--dorado3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
    margin-bottom: 2px;
  }

  .pedido-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 0;
  }

  .pedido-cant {
    color: var(--dorado);
    font-weight: 600;
    min-width: 20px;
    font-family: 'Playfair Display', serif;
  }

  .pedido-notas {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--gris1);
    font-size: 12px;
    color: var(--gris4);
    font-style: italic;
    line-height: 1.5;
  }

  /* ── ALERT ── */
  .alert-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--gris1);
    border: 1px solid var(--gris2);
    color: var(--blanco);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 10px;
    z-index: 500;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    max-width: calc(100vw - 32px);
    text-align: center;
  }

  .alert-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── LOADING ── */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--negro);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-logo {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--dorado);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--negro);
    animation: pulso 1.2s ease-in-out infinite;
  }

  .loading-texto {
    font-size: 13px;
    color: var(--gris4);
  }

  @keyframes pulso {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.95); opacity: 0.7; }
  }

  .error-screen {
    position: fixed;
    inset: 0;
    background: var(--negro);

<body>

<main class="main" id="mainContent" style="display:none;">

        <button class="cal-nav" id="calPrev">&#8249;</button>

        <div class="cal-dia-label">M</div>
        <div class="cal-dia-label">M</div>

  <div class="teclado-display" id="tecladoDisplay">0</div>
  <div class="teclado-grid" id="tecladoGrid"></div>

<!-- Modal éxito -->
<div class="modal-overlay" id="modalExito">
  <div class="modal-card">
    <div class="modal-icono">✓</div>

    <div class="modal-btns">

<!-- Drawer historial -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawerHistorial">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-titulo">Mis pedidos</div>
    <button class="btn-cerrar-drawer" id="btnCerrarDrawer">✕</button>
  </div>
  <div class="drawer-content" id="drawerContent"></div>
</div>

<!-- Toast alerta -->
<div class="alert-toast" id="alertToast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // ── CONFIG ──
  const SUPABASE_URL = 'https://wttdrnftxmdqnfauhkkp.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0dGRybmZ0eG1kcW5mYXVoa2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjI5NzUsImV4cCI6MjA5MDUzODk3NX0.1NiCaHaEZPsa85cbZVC1iAxDu1FbQ7tiM-VBt_e68Qk';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── ESTADO ──
  let cafeteria = null;         // datos desde Supabase
  let pedidosExistentes = [];   // pedidos de los últimos 15 días
  let fechaSeleccionada = null; // Date object
  let calAnio = 0;
  let calMes = 0;
  let cantidades = {};          // { "sucursal|prodId": cantidad }
  let tecladoTarget = null;     // { sucursalKey, prodId, nombre }
  let tecladoValor = '';
  let ultimoPedidoData = null;  // para compartir por WA

  // ── ELEMENTOS ──
  const loadingScreen   = document.getElementById('loadingScreen');
  const errorScreen     = document.getElementById('errorScreen');
  const errorMsg        = document.getElementById('errorMsg');
  const mainContent     = document.getElementById('mainContent');
  const cafeNombreEl    = document.getElementById('cafeNombreHeader');
  const logoImg         = document.getElementById('logoImg');
  const logoLetra       = document.getElementById('logoLetra');
  const calMesEl        = document.getElementById('calMes');
  const calGrid         = document.getElementById('calGrid');
  const calPrev         = document.getElementById('calPrev');
  const calNext         = document.getElementById('calNext');
  const entregaTextoEl  = document.getElementById('entregaTexto');
  const productosEl     = document.getElementById('productosContainer');
  const notasInput      = document.getElementById('notasInput');
  const barraEnvio      = document.getElementById('barraEnvio');
  const barraTotalEl    = document.getElementById('barraTotalNum');
  const btnConfirmar    = document.getElementById('btnConfirmar');
  const tecladoOverlay  = document.getElementById('tecladoOverlay');
  const tecladoSheet    = document.getElementById('tecladoSheet');
  const tecladoNombreEl = document.getElementById('tecladoProductoNombre');
  const tecladoDisplay  = document.getElementById('tecladoDisplay');
  const tecladoGrid     = document.getElementById('tecladoGrid');
  const btnTecladoOk    = document.getElementById('btnTecladoOk');
  const modalExito      = document.getElementById('modalExito');
  const modalSubtituloEl= document.getElementById('modalSubtitulo');
  const btnWhatsapp     = document.getElementById('btnWhatsapp');
  const btnCerrarModal  = document.getElementById('btnCerrarModal');
  const drawerOverlay   = document.getElementById('drawerOverlay');
  const drawerHistorial = document.getElementById('drawerHistorial');
  const drawerContent   = document.getElementById('drawerContent');
  const btnHistorial    = document.getElementById('btnHistorial');
  const btnCerrarDrawer = document.getElementById('btnCerrarDrawer');
  const alertToast      = document.getElementById('alertToast');

  // ── LOGO FALLBACK ──
  logoImg.addEventListener('load', () => {
    logoImg.style.display = 'block';
    logoLetra.style.display = 'none';
  });
  logoImg.addEventListener('error', () => {
    logoImg.style.display = 'none';
    logoLetra.style.display = 'flex';
  });

  // ── UTILS ──
  const DIAS_ES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function fechaStr(d) {
    // YYYY-MM-DD en hora local
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }

  function tienePedidoEnFecha(fecha) {
    const str = fechaStr(fecha);
    return pedidosExistentes.some(p => p.fecha_entrega === str);
  }

  function toast(msg, dur=2800) {
    alertToast.textContent = msg;
    alertToast.classList.add('visible');
    setTimeout(() => alertToast.classList.remove('visible'), dur);
  }

  // ── SLUG DESDE URL ──
  function getSlug() {
    const params = new URLSearchParams(window.location.search);
    return params.get('cafe') || '';
  }

  // ── INIT ──
  async function init() {
    const slug = getSlug();
    if (!slug) {
      mostrarError('No se especificó una cafetería. Verifica tu link.');
      return;
    }

    try {
      const { data, error } = await db
        .from('cafeterias')
        .select('*')
        .eq('slug', slug)
        .single();

      if (error || !data) {
        mostrarError(`No se encontró la cafetería "${slug}".`);
        return;
      }

      cafeteria = data;
      cafeNombreEl.textContent = cafeteria.nombre;
      document.title = `${cafeteria.nombre} — Panfitrión`;

      await cargarPedidosRecientes();
      renderCalendario();
      renderProductos();

      loadingScreen.style.display = 'none';
      mainContent.style.display = '';

    } catch(e) {
      mostrarError('Error de conexión. Intenta de nuevo.');
    }
  }

  function mostrarError(msg) {
    loadingScreen.style.display = 'none';
    errorMsg.textContent = msg;
    errorScreen.style.display = 'flex';
  }

  async function cargarPedidosRecientes() {
    const hace15 = new Date();
    hace15.setDate(hace15.getDate() - 15);
    const { data } = await db
      .from('pedidos')
      .select('*')
      .eq('cafeteria_id', cafeteria.id)
      .gte('fecha_entrega', fechaStr(hace15))
      .order('fecha', { ascending: false });
    pedidosExistentes = data || [];
  }

  // ── CALENDARIO ──
  function renderCalendario() {
    const hoy = new Date();
    calAnio = hoy.getFullYear();
    calMes  = hoy.getMonth();
    dibujarCal();
  }

  function dibujarCal() {
    const hoy = new Date();
    hoy.setHours(0,0,0,0);

    const nombreMes = MESES_ES[calMes];
    calMesEl.textContent = `${nombreMes.charAt(0).toUpperCase() + nombreMes.slice(1)} ${calAnio}`;

    // Primer día del mes (ajustar a lunes=0)
    const primerDia = new Date(calAnio, calMes, 1);
    let inicioSemana = primerDia.getDay(); // 0=dom
    inicioSemana = (inicioSemana === 0) ? 6 : inicioSemana - 1; // lunes=0

    const diasEnMes = new Date(calAnio, calMes + 1, 0).getDate();

    calGrid.innerHTML = '';

    // Celdas vacías
    for (let i = 0; i < inicioSemana; i++) {
      const v = document.createElement('div');
      v.className = 'cal-dia vacio';
      calGrid.appendChild(v);
    }

    for (let d = 1; d <= diasEnMes; d++) {
      const fecha = new Date(calAnio, calMes, d);
      fecha.setHours(0,0,0,0);
      const cel = document.createElement('div');
      cel.className = 'cal-dia';
      cel.textContent = d;

      const esHoy = fecha.getTime() === hoy.getTime();
      const esPasado = fecha < hoy;
      const conPedido = tienePedidoEnFecha(fecha);
      const esSeleccionado = fechaSeleccionada && fecha.getTime() === fechaSeleccionada.getTime();

      if (esPasado) cel.classList.add('pasado');
      else if (conPedido) cel.classList.add('con-pedido');
      else if (esSeleccionado) cel.classList.add('seleccionado');
      else if (esHoy) cel.classList.add('hoy');

      if (!esPasado && !conPedido) {
        cel.addEventListener('click', () => seleccionarFecha(fecha));
      }

      calGrid.appendChild(cel);
    }
  }

  calPrev.addEventListener('click', () => {
    calMes--;
    if (calMes < 0) { calMes = 11; calAnio--; }
    dibujarCal();
  });

  calNext.addEventListener('click', () => {
    calMes++;
    if (calMes > 11) { calMes = 0; calAnio++; }
    dibujarCal();
  });

  function seleccionarFecha(fecha) {
    if (tienePedidoEnFecha(fecha)) {
      toast('Ya tienes un pedido para esta fecha.');
      return;
    }
    fechaSeleccionada = fecha;
    dibujarCal();
    const diaNombre = DIAS_ES[fecha.getDay()];
    const dia = fecha.getDate();
    const mes = MESES_ES[fecha.getMonth()];
    entregaTextoEl.textContent = `Entrega: ${diaNombre} ${dia} de ${mes}`;
    entregaTextoEl.style.display = 'block';
    actualizarBarra();
  }

  // ── PRODUCTOS ──
  function renderProductos() {
    productosEl.innerHTML = '';
    cantidades = {};
    const menu = cafeteria.menu || [];
    const sucursales = cafeteria.sucursales || [];

    if (sucursales.length > 0) {
      sucursales.forEach(suc => {
        const bloque = document.createElement('div');
        bloque.className = 'sucursal-bloque';
        bloque.innerHTML = `
          <div class="sucursal-header">
            <div class="sucursal-punto"></div>
            <div class="sucursal-nombre">${suc}</div>
            <div class="sucursal-total">Total: <span id="suc-total-${suc}">0</span></div>
          </div>
        `;
        menu.forEach(prod => {
          const key = `${suc}|${prod.id}`;
          cantidades[key] = 0;
          bloque.appendChild(crearFilaProducto(prod, suc));
        });
        productosEl.appendChild(bloque);
      });
    } else {
      menu.forEach(prod => {
        const key = `|${prod.id}`;
        cantidades[key] = 0;
        productosEl.appendChild(crearFilaProducto(prod, ''));
      });
    }
  }

  function crearFilaProducto(prod, suc) {
    const key = `${suc}|${prod.id}`;
    const fila = document.createElement('div');
    fila.className = 'producto-row';
    fila.innerHTML = `
      <div class="producto-nombre">${prod.nombre}</div>
      <div class="cantidad-ctrl">
        <button class="btn-cant btn-menos" data-key="${key}">−</button>
        <div class="cant-num" data-key="${key}" id="cant-${key}">0</div>
        <button class="btn-cant btn-mas" data-key="${key}">+</button>
      </div>
    `;

    fila.querySelector('.btn-menos').addEventListener('click', () => cambiarCant(key, -1, prod, suc));
    fila.querySelector('.btn-mas').addEventListener('click', () => cambiarCant(key, 1, prod, suc));
    fila.querySelector('.cant-num').addEventListener('click', () => abrirTeclado(key, prod.nombre));

    return fila;
  }

  function cambiarCant(key, delta, prod, suc) {
    const nuevo = Math.max(0, (cantidades[key] || 0) + delta);
    cantidades[key] = nuevo;
    actualizarCantUI(key);
    if (suc) actualizarTotalSucursal(suc);
    actualizarBarra();
  }

  function actualizarCantUI(key) {
    const el = document.getElementById(`cant-${key}`);
    if (el) {
      el.textContent = cantidades[key] || 0;
      el.classList.toggle('activo', (cantidades[key] || 0) > 0);
    }
  }

  function actualizarTotalSucursal(suc) {
    const total = Object.entries(cantidades)
      .filter(([k]) => k.startsWith(`${suc}|`))
      .reduce((s, [, v]) => s + (v || 0), 0);
    const el = document.getElementById(`suc-total-${suc}`);
    if (el) el.textContent = total;
  }

  function totalPiezas() {
    return Object.values(cantidades).reduce((s, v) => s + (v || 0), 0);
  }

  function actualizarBarra() {
    const total = totalPiezas();
    barraTotalEl.innerHTML = `${total} <span>piezas</span>`;
    const activo = total > 0 && fechaSeleccionada;
    barraEnvio.classList.toggle('visible', total > 0);
    btnConfirmar.disabled = !activo;
  }

  // ── TECLADO NUMÉRICO ──
  function construirTecladoGrid() {
    tecladoGrid.innerHTML = '';
    const teclas = ['1','2','3','4','5','6','7','8','9','⌫','0',''];
    teclas.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'teclado-btn';
      if (t === '⌫') btn.classList.add('borrar');
      if (t === '0') btn.classList.add('cero');
      if (t === '') return; // espacio vacío (ocultado por cero span 2)
      btn.textContent = t;
      btn.addEventListener('click', () => presionarTecla(t));
      tecladoGrid.appendChild(btn);
    });
    // Rehacer: 1,2,3 / 4,5,6 / 7,8,9 / borrar,0(span2)
    tecladoGrid.innerHTML = '';
    const orden = ['1','2','3','4','5','6','7','8','9','⌫','0'];
    orden.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'teclado-btn';
      if (t === '⌫') btn.classList.add('borrar');
      if (t === '0') btn.classList.add('cero');
      btn.textContent = t;
      btn.addEventListener('click', () => presionarTecla(t));
      tecladoGrid.appendChild(btn);
    });
  }

  function presionarTecla(t) {
    if (t === '⌫') {
      tecladoValor = tecladoValor.slice(0, -1);
    } else {
      if (tecladoValor.length >= 3) return; // máx 999
      if (tecladoValor === '0') tecladoValor = t;
      else tecladoValor += t;
    }
    tecladoDisplay.textContent = tecladoValor || '0';
  }

  function abrirTeclado(key, nombre) {
    tecladoTarget = { key, nombre };
    tecladoValor = String(cantidades[key] || 0);
    if (tecladoValor === '0') tecladoValor = '';
    tecladoNombreEl.textContent = nombre;
    tecladoDisplay.textContent = tecladoValor || '0';
    construirTecladoGrid();
    tecladoOverlay.classList.add('visible');
    tecladoSheet.classList.add('visible');
  }

  function cerrarTeclado() {
    tecladoOverlay.classList.remove('visible');
    tecladoSheet.classList.remove('visible');
    tecladoTarget = null;
    tecladoValor = '';
  }

  btnTecladoOk.addEventListener('click', () => {
    if (!tecladoTarget) { cerrarTeclado(); return; }
    const val = parseInt(tecladoValor) || 0;
    cantidades[tecladoTarget.key] = val;
    actualizarCantUI(tecladoTarget.key);
    // Actualizar total sucursal si aplica
    const partes = tecladoTarget.key.split('|');
    if (partes[0]) actualizarTotalSucursal(partes[0]);
    actualizarBarra();
    cerrarTeclado();
  });

  tecladoOverlay.addEventListener('click', cerrarTeclado);

  // ── ENVIAR PEDIDO ──
  btnConfirmar.addEventListener('click', async () => {
    if (!fechaSeleccionada) { toast('Selecciona una fecha de entrega.'); return; }
    if (totalPiezas() === 0) { toast('Agrega al menos un producto.'); return; }
    if (tienePedidoEnFecha(fechaSeleccionada)) { toast('Ya tienes un pedido para esta fecha.'); return; }

    btnConfirmar.disabled = true;
    btnConfirmar.textContent = 'Enviando…';

    const menu = cafeteria.menu || [];
    const sucursales = cafeteria.sucursales || [];
    let productos;

    if (sucursales.length > 0) {
      productos = sucursales.map(suc => ({
        sucursal: suc,
        items: menu
          .filter(p => (cantidades[`${suc}|${p.id}`] || 0) > 0)
          .map(p => ({ id: p.id, nombre: p.nombre, cantidad: cantidades[`${suc}|${p.id}`] }))
      })).filter(s => s.items.length > 0);
    } else {
      productos = menu
        .filter(p => (cantidades[`|${p.id}`] || 0) > 0)
        .map(p => ({ id: p.id, nombre: p.nombre, cantidad: cantidades[`|${p.id}`] }));
    }

    const pedido = {
      cafeteria_id:     cafeteria.id,
      cafeteria_nombre: cafeteria.nombre,
      productos:        productos,
      notas:            notasInput.value.trim(),
      fecha_entrega:    fechaStr(fechaSeleccionada),
      fecha:            new Date().toISOString()
    };

    const { data, error } = await db.from('pedidos').insert([pedido]).select();

    btnConfirmar.textContent = 'Confirmar pedido';

    if (error) {
      toast('Error al enviar el pedido. Intenta de nuevo.');
      btnConfirmar.disabled = false;
      return;
    }

    ultimoPedidoData = pedido;
    pedidosExistentes.push({ ...pedido, id: data[0].id });
    mostrarModalExito(pedido);
    resetFormulario();
  });

  function resetFormulario() {
    cantidades = {};
    renderProductos();
    fechaSeleccionada = null;
    entregaTextoEl.style.display = 'none';
    notasInput.value = '';
    barraEnvio.classList.remove('visible');
    dibujarCal();
  }

  // ── MODAL ÉXITO ──
  function mostrarModalExito(pedido) {
    const dia = DIAS_ES[fechaSeleccionada ? fechaSeleccionada.getDay() : new Date(pedido.fecha_entrega).getDay()];
    const partesFecha = pedido.fecha_entrega.split('-');
    const dNum = parseInt(partesFecha[2]);
    const mes = MESES_ES[parseInt(partesFecha[1]) - 1];
    modalSubtituloEl.textContent = `Entrega confirmada para el ${dia} ${dNum} de ${mes}.`;
    modalExito.classList.add('visible');
  }

  btnCerrarModal.addEventListener('click', () => {
    modalExito.classList.remove('visible');
    ultimoPedidoData = null;
  });

  modalExito.addEventListener('click', (e) => {
    if (e.target === modalExito) {
      modalExito.classList.remove('visible');
      ultimoPedidoData = null;
    }
  });

  // ── WHATSAPP ──
  btnWhatsapp.addEventListener('click', () => {
    if (!ultimoPedidoData) return;
    const texto = generarTextoWA(ultimoPedidoData);
    if (navigator.share) {
      navigator.share({ text: texto }).catch(() => {
        window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
      });
    } else {
      window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    }
  });

  function generarTextoWA(pedido) {
    const partes = pedido.fecha_entrega.split('-');
    const dNum = parseInt(partes[2]);
    const mes = MESES_ES[parseInt(partes[1]) - 1];
    let txt = `🍞 *Pedido Panfitrión*\n`;
    txt += `📍 ${pedido.cafeteria_nombre}\n`;
    txt += `📅 Entrega: ${dNum} de ${mes}\n\n`;

    const prods = pedido.productos;
    if (prods.length > 0 && prods[0].sucursal) {
      prods.forEach(s => {
        txt += `*${s.sucursal}*\n`;
        s.items.forEach(i => { txt += `• ${i.nombre}: ${i.cantidad}\n`; });
        txt += '\n';
      });
    } else {
      prods.forEach(i => { txt += `• ${i.nombre}: ${i.cantidad}\n`; });
      txt += '\n';
    }

    if (pedido.notas) txt += `📝 ${pedido.notas}`;
    return txt.trim();
  }

  // ── HISTORIAL ──
  btnHistorial.addEventListener('click', async () => {
    drawerContent.innerHTML = '<div class="historial-vacio">Cargando pedidos…</div>';
    drawerOverlay.classList.add('visible');
    drawerHistorial.classList.add('visible');

    await cargarPedidosRecientes();
    renderHistorial();
  });

  function cerrarDrawer() {
    drawerOverlay.classList.remove('visible');
    drawerHistorial.classList.remove('visible');
  }

  btnCerrarDrawer.addEventListener('click', cerrarDrawer);
  drawerOverlay.addEventListener('click', cerrarDrawer);

  function renderHistorial() {
    if (!pedidosExistentes || pedidosExistentes.length === 0) {
      drawerContent.innerHTML = '<div class="historial-vacio">No tienes pedidos en los últimos 15 días.</div>';
      return;
    }

    drawerContent.innerHTML = '';
    pedidosExistentes.forEach(p => {
      const card = document.createElement('div');
      card.className = 'pedido-card';

      const fechaEnvio = new Date(p.fecha);
      const fechaEnvioStr = `${fechaEnvio.getDate()} de ${MESES_ES[fechaEnvio.getMonth()]} — ${String(fechaEnvio.getHours()).padStart(2,'0')}:${String(fechaEnvio.getMinutes()).padStart(2,'0')}`;

      const partes = (p.fecha_entrega || '').split('-');
      const entregaStr = partes.length === 3
        ? `${parseInt(partes[2])} de ${MESES_ES[parseInt(partes[1])-1]}`
        : p.fecha_entrega;

      let productosHTML = '';
      const prods = p.productos || [];

      if (prods.length > 0 && prods[0].sucursal !== undefined) {
        // Formato nuevo con sucursales
        prods.forEach(s => {
          productosHTML += `<div class="pedido-sucursal-nombre">${s.sucursal}</div>`;
          (s.items || []).forEach(i => {
            productosHTML += `<div class="pedido-item"><span class="pedido-cant">${i.cantidad}</span><span>${i.nombre}</span></div>`;
          });
        });
      } else {
        // Formato legacy plano
        prods.forEach(i => {
          productosHTML += `<div class="pedido-item"><span class="pedido-cant">${i.cantidad}</span><span>${i.nombre}</span></div>`;
        });
      }

      const notasHTML = p.notas
        ? `<div class="pedido-notas">📝 ${p.notas}</div>`
        : '';

      card.innerHTML = `
        <div class="pedido-card-header">
          <div class="pedido-fecha-envio">Enviado: ${fechaEnvioStr}</div>
          <div class="pedido-fecha-entrega">Entrega: ${entregaStr}</div>
        </div>
        <div class="pedido-productos">${productosHTML}</div>
        ${notasHTML}
      `;
      drawerContent.appendChild(card);
    });
  }

  // ── ARRANCAR ──
  init();
</script>
</body>
</html>
