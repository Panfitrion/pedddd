<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Panfitrión</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ── */
    :root {
      --negro:   #0a0a0a;
      --dorado:  #c9a84c;
      --dorado2: #9a7a2e;
      --dorado3: rgba(201,168,76,0.12);
      --blanco:  #f5f2eb;
      --gris1:   #141414;
      --gris2:   #1e1e1e;
      --gris3:   #282828;
      --gris4:   #333333;
      --tenue:   #a09070;
      --texto:   #d4c9a8;
    }

    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--negro);
      color: var(--blanco);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─────────────────────────────
       HEADER
    ───────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 60;
      background: var(--negro);
      border-bottom: 1px solid rgba(201,168,76,0.15);
      padding: 16px 20px 12px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .marca {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .marca-circulo {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--dorado);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .marca-circulo img { width: 24px; height: 24px; object-fit: contain; display: none; }

    .marca-letra {
      font-family: 'Playfair Display', serif;
      font-size: 13px; font-weight: 900;
      color: var(--dorado);
    }

    .marca-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 700;
      letter-spacing: 0.02em;
    }

    .marca-nombre span { color: var(--dorado); }

    .btn-historial {
      background: var(--dorado3);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px;
      padding: 6px 14px;
      color: var(--dorado);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
    }

    .cafe-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 900;
      line-height: 1.1;
    }

    .cafe-sub {
      font-size: 11px;
      color: var(--tenue);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ─────────────────────────────
       ESTADO (loading / error)
    ───────────────────────────── */
    .estado {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; gap: 16px;
      padding: 40px 24px; text-align: center;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(201,168,76,0.1);
      border-top-color: var(--dorado);
      border-radius: 50%;
      animation: girar 0.8s linear infinite;
    }

    @keyframes girar { to { transform: rotate(360deg); } }

    .estado p  { color: var(--tenue); font-size: 14px; }
    .estado h2 { font-family: 'Playfair Display', serif; font-size: 20px; }
    .estado .icono-grande { font-size: 48px; }

    /* ─────────────────────────────
       SELECTOR DE FECHA (calendario custom)
    ───────────────────────────── */
    .fecha-wrap {
      padding: 16px 20px 0;
    }

    .fecha-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--dorado);
      display: block; margin-bottom: 10px;
    }

    .calendario {
      background: var(--gris2);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 16px;
      overflow: hidden;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .cal-mes {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 700;
      color: var(--blanco);
    }

    .cal-nav {
      background: transparent;
      border: none;
      color: var(--dorado);
      font-size: 18px;
      cursor: pointer;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
    }

    .cal-nav:active { background: var(--dorado3); }

    .cal-dias-semana {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 8px 12px 4px;
    }

    .cal-dia-semana {
      text-align: center;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--tenue);
      padding: 4px 0;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 4px 12px 12px;
    }

    .cal-celda {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .cal-celda:empty { cursor: default; }

    .cal-celda.pasado   { color: var(--gris4); cursor: not-allowed; }
    .cal-celda.hoy      { color: var(--dorado); font-weight: 700; }
    .cal-celda.hoy::after {
      content: '';
      position: absolute; bottom: 3px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--dorado);
    }
    .cal-celda.con-pedido { color: var(--tenue); }
    .cal-celda.con-pedido::before {
      content: '';
      position: absolute; inset: 2px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
    }
    .cal-celda.disponible:hover { background: var(--dorado3); color: var(--dorado); }
    .cal-celda.seleccionado {
      background: var(--dorado);
      color: var(--negro);
      font-weight: 700;
    }
    .cal-celda.seleccionado::after { display: none; }

    .fecha-seleccionada-texto {
      text-align: center;
      font-size: 13px;
      color: var(--texto);
      padding: 10px 0 0;
    }

    .fecha-seleccionada-texto span {
      color: var(--dorado);
      font-weight: 600;
    }

    /* ─────────────────────────────
       ALERTA PEDIDO YA ENVIADO
    ───────────────────────────── */
    .alerta-enviado {
      margin: 16px 20px 0;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 12px;
      padding: 14px 16px;
      display: none;
    }

    .alerta-enviado.visible { display: block; }

    .alerta-enviado-titulo {
      font-size: 13px; font-weight: 600;
      color: var(--dorado);
      margin-bottom: 4px;
    }

    .alerta-enviado-texto {
      font-size: 12px;
      color: var(--tenue);
      line-height: 1.5;
    }

    /* ─────────────────────────────
       SUCURSALES Y PRODUCTOS
    ───────────────────────────── */
    .pedido-wrap {
      padding: 0 20px;
    }

    /* Separador de sucursal */
    .sucursal-bloque {
      margin-top: 20px;
    }

    .sucursal-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 8px;
      border-bottom: 1px solid rgba(201,168,76,0.18);
      margin-bottom: 2px;
    }

    .sucursal-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dorado);
      flex-shrink: 0;
    }

    .sucursal-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 700;
      color: var(--blanco);
      flex: 1;
    }

    .sucursal-total {
      font-size: 11px; font-weight: 600;
      color: var(--dorado);
      background: var(--dorado3);
      border-radius: 10px;
      padding: 3px 9px;
    }

    /* Fila de producto */
    .producto-fila {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .producto-fila:last-child { border-bottom: none; }

    .producto-nombre {
      flex: 1;
      font-size: 15px; font-weight: 500;
      line-height: 1.3;
      color: var(--texto);
    }

    /* Control de cantidad */
    .cantidad {
      display: flex;
      align-items: center;
      background: var(--gris3);
      border: 1px solid rgba(201,168,76,0.1);
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .cantidad-btn {
      width: 38px; height: 38px;
      background: transparent; border: none;
      color: var(--dorado);
      font-size: 22px; font-weight: 300;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
    }

    .cantidad-btn:active { background: rgba(201,168,76,0.12); }

    .cantidad-num {
      min-width: 32px;
      text-align: center;
      font-size: 15px; font-weight: 600;
      color: var(--blanco);
      cursor: pointer;
      transition: color 0.15s;
    }

    .cantidad-num.activo { color: var(--dorado); }

    /* ─────────────────────────────
       NOTAS
    ───────────────────────────── */
    .notas-wrap {
      padding: 20px 20px 0;
    }

    .notas-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--dorado);
      display: block; margin-bottom: 8px;
    }

    .notas-input {
      width: 100%;
      background: var(--gris2);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--blanco);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none; outline: none;
      min-height: 70px;
    }

    .notas-input::placeholder { color: rgba(160,144,112,0.4); }
    .notas-input:focus { border-color: rgba(201,168,76,0.35); }

    /* ─────────────────────────────
       ESPACIO INFERIOR Y BARRA
    ───────────────────────────── */
    .espacio { height: 110px; }

    .barra {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 60;
      background: var(--gris2);
      border-top: 1px solid rgba(201,168,76,0.18);
      padding: 10px 20px 28px;
      transform: translateY(100%);
      transition: transform 0.28s ease;
    }

    .barra.visible { transform: translateY(0); }

    .barra-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .barra-label { font-size: 12px; color: var(--tenue); }
    .barra-cuenta { font-size: 13px; font-weight: 600; color: var(--dorado); }

    .btn-enviar {
      width: 100%;
      background: var(--dorado);
      border: none; border-radius: 14px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      color: var(--negro);
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-enviar:active  { opacity: 0.85; }
    .btn-enviar:disabled { opacity: 0.4; }

    /* ─────────────────────────────
       TECLADO NUMÉRICO
    ───────────────────────────── */
    .teclado-fondo {
      position: fixed; inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      display: none; align-items: flex-end;
    }

    .teclado-fondo.visible { display: flex; }

    .teclado {
      width: 100%;
      background: var(--gris2);
      border-radius: 22px 22px 0 0;
      padding: 20px 18px 34px;
      animation: subir 0.22s ease;
    }

    @keyframes subir { from { transform: translateY(100%); } }

    .teclado-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 700;
      color: var(--blanco);
      margin-bottom: 14px;
    }

    .teclado-sucursal {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dorado);
      margin-bottom: 6px;
    }

    .teclado-pantalla {
      background: var(--negro);
      border-radius: 14px;
      height: 76px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 46px; font-weight: 700;
      color: var(--dorado);
      margin-bottom: 14px;
      letter-spacing: -2px;
    }

    .teclado-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .tecla {
      background: var(--gris3);
      border: none; border-radius: 14px;
      height: 60px;
      font-size: 22px; font-weight: 500;
      color: var(--blanco);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: transform 0.1s, background 0.1s;
    }

    .tecla:active { transform: scale(0.94); background: rgba(201,168,76,0.18); }
    .tecla.borrar { font-size: 18px; color: var(--tenue); }
    .tecla.ok { background: var(--dorado); color: var(--negro); font-weight: 700; font-size: 16px; }
    .tecla.ok:active { background: var(--dorado2); }

    /* ─────────────────────────────
       MODAL ÉXITO
    ───────────────────────────── */
    .modal-fondo {
      position: fixed; inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }

    .modal-fondo.visible { display: flex; }

    .modal {
      background: var(--gris2);
      border-radius: 22px;
      border: 1px solid rgba(201,168,76,0.2);
      padding: 32px 26px;
      text-align: center;
      max-width: 340px; width: 100%;
      animation: aparecer 0.28s ease;
    }

    @keyframes aparecer { from { transform: scale(0.9); opacity: 0; } }

    .modal-icono  { font-size: 52px; margin-bottom: 16px; }
    .modal-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
      margin-bottom: 8px;
    }
    .modal-texto  {
      font-size: 13px; color: var(--tenue);
      line-height: 1.6; margin-bottom: 24px;
    }

    .btn-wa {
      width: 100%;
      background: #25D366; border: none;
      border-radius: 14px; padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 10px;
    }

    .btn-wa:active { opacity: 0.85; }

    .btn-otro {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 14px; padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--tenue);
      cursor: pointer;
    }

    /* ─────────────────────────────
       PANEL HISTORIAL (drawer)
    ───────────────────────────── */
    .historial-fondo {
      position: fixed; inset: 0;
      z-index: 250;
      background: rgba(0,0,0,0.75);
      display: none; align-items: flex-end;
    }

    .historial-fondo.visible { display: flex; }

    .historial-panel {
      width: 100%;
      background: var(--gris1);
      border-radius: 22px 22px 0 0;
      padding: 20px 20px 40px;
      max-height: 85vh;
      overflow-y: auto;
      animation: subir 0.28s ease;
    }

    .historial-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .historial-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 900;
    }

    .btn-cerrar-historial {
      background: var(--gris3); border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 18px; color: var(--tenue);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .historial-vacio {
      text-align: center;
      padding: 40px 0;
      color: var(--tenue);
      font-size: 14px;
    }

    .pedido-card {
      background: var(--gris2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      animation: aparecer 0.2s ease;
    }

    .pedido-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .pedido-card-fecha {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--dorado);
    }

    .pedido-card-entrega {
      font-size: 11px;
      color: var(--tenue);
      margin-top: 2px;
    }

    .pedido-card-badge {
      background: var(--dorado3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px; font-weight: 600;
      color: var(--dorado);
    }

    .pedido-card-sucursal {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--tenue);
      margin: 8px 0 4px;
    }

    .pedido-card-productos {
      font-size: 13px;
      color: var(--texto);
      line-height: 1.7;
    }

    .pedido-card-productos span {
      color: var(--dorado);
      font-weight: 600;
    }

    .pedido-card-notas {
      font-size: 12px; color: var(--tenue);
      font-style: italic;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* ─────────────────────────────
       TOAST
    ───────────────────────────── */
    .toast {
      position: fixed;
      top: 16px; left: 50%;
      z-index: 500;
      transform: translateX(-50%) translateY(-80px);
      background: var(--gris3);
      color: var(--blanco);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      padding: 11px 20px;
      font-size: 13px;
      white-space: nowrap;
      transition: transform 0.28s ease;
    }

    .toast.visible { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="marca">
        <div class="marca-circulo">
          <img id="logoImg" src="logo.png" alt="P"
            onload="this.style.display='block'; document.getElementById('marcaLetra').style.display='none'" />
          <span class="marca-letra" id="marcaLetra">P</span>
        </div>
        <span class="marca-nombre">Panfi<span>trión</span></span>
      </div>
      <button class="btn-historial" id="btnHistorial">Mis pedidos</button>
    </div>
    <div class="cafe-nombre" id="cafeNombre">Cargando…</div>
    <div class="cafe-sub">Selecciona fecha y haz tu pedido</div>
  </header>

  <!-- Contenido dinámico -->
  <main id="contenido">
    <div class="estado">
      <div class="spinner"></div>
      <p>Cargando…</p>
    </div>
  </main>

  <div class="espacio"></div>

  <!-- Barra de envío -->
  <div class="barra" id="barra">
    <div class="barra-info">
      <span class="barra-label">Pedido listo para enviar</span>
      <span class="barra-cuenta" id="barraCuenta">0 productos</span>
    </div>
    <button class="btn-enviar" id="btnEnviar">Confirmar pedido</button>
  </div>

  <!-- Teclado numérico -->
  <div class="teclado-fondo" id="tecladoFondo">
    <div class="teclado">
      <div class="teclado-sucursal" id="tecladoSucursal"></div>
      <div class="teclado-nombre" id="tecladoNombre"></div>
      <div class="teclado-pantalla" id="tecladoPantalla">0</div>
      <div class="teclado-grid">
        <button class="tecla" data-k="7">7</button>
        <button class="tecla" data-k="8">8</button>
        <button class="tecla" data-k="9">9</button>
        <button class="tecla" data-k="4">4</button>
        <button class="tecla" data-k="5">5</button>
        <button class="tecla" data-k="6">6</button>
        <button class="tecla" data-k="1">1</button>
        <button class="tecla" data-k="2">2</button>
        <button class="tecla" data-k="3">3</button>
        <button class="tecla borrar" data-k="del">⌫</button>
        <button class="tecla" data-k="0">0</button>
        <button class="tecla ok" data-k="ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Modal éxito -->
  <div class="modal-fondo" id="modalFondo">
    <div class="modal">
      <div class="modal-icono">✅</div>
      <div class="modal-titulo">¡Pedido registrado!</div>
      <div class="modal-texto">
        Tu pedido quedó guardado. Compártelo por WhatsApp para confirmarlo con Panfitrión.
      </div>
      <button class="btn-wa" id="btnWhatsApp">
        <svg width="19" height="19" fill="white" viewBox="0 0 24 24">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Compartir por WhatsApp
      </button>
      <button class="btn-otro" id="btnOtroPedido">Cerrar</button>

  </div>

  <!-- Panel historial -->
  <div class="historial-fondo" id="historialFondo">
    <div class="historial-panel">
      <div class="historial-header">
        <div class="historial-titulo">Mis pedidos</div>
        <button class="btn-cerrar-historial" id="btnCerrarHistorial">×</button>
      </div>
      <div id="historialContenido">
        <div class="historial-vacio">Cargando…</div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    // ─────────────────────────────────────────
    // Configuración
    // ─────────────────────────────────────────
    const SUPABASE_URL = 'https://wttdrnftxmdqnfauhkkp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0dGRybmZ0eG1kcW5mYXVoa2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjI5NzUsImV4cCI6MjA5MDUzODk3NX0.1NiCaHaEZPsa85cbZVC1iAxDu1FbQ7tiM-VBt_e68Qk';

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ─────────────────────────────────────────
    // Estado global
    // ─────────────────────────────────────────
    let cafeteria       = null;
    let productos       = [];
    let sucursales      = [];          // ['Sucursal 1', 'Sucursal 2', ...]
    let cantidades      = {};          // { 'sucursal::prodId': number }
    let pedidoActual    = null;
    let fechaSeleccionada = null;      // 'YYYY-MM-DD'
    let pedidosDias     = {};          // { 'YYYY-MM-DD': pedidoObj } últimos 15 días
    let calMesActual    = new Date();

    // Teclado
    let tecladoKey   = null;           // 'sucursal::prodId'
    let tecladoValor = '';

    // ─────────────────────────────────────────
    // Arranque
    // ─────────────────────────────────────────
    async function init() {
      const slug = new URLSearchParams(window.location.search).get('cafe');

      if (!slug) {
        mostrarError('Link inválido', 'Contacta a Panfitrión para obtener tu link correcto.');
        return;
      }

      const { data, error } = await db
        .from('cafeterias')
        .select('*')
        .eq('slug', slug)
        .single();

      if (error || !data) {
        mostrarError('Cafetería no encontrada', 'Contacta a Panfitrión para obtener tu link correcto.');
        return;
      }

      cafeteria  = data;
      productos  = data.menu || [];
      sucursales = data.sucursales || [];

      // Si no tiene sucursales configuradas, trabajar como única sucursal
      if (!sucursales.length) sucursales = [''];

      // Inicializar cantidades
      sucursales.forEach(s => {
        productos.forEach(p => { cantidades[`${s}::${p.id}`] = 0; });
      });

      document.getElementById('cafeNombre').textContent = data.nombre;
      document.title = `${data.nombre} — Panfitrión`;

      // Cargar pedidos recientes para el calendario
      await cargarPedidosRecientes();

      renderizarApp();
    }

    // ─────────────────────────────────────────
    // Cargar pedidos de los últimos 15 días
    // ─────────────────────────────────────────
    async function cargarPedidosRecientes() {
      const hace15 = new Date();
      hace15.setDate(hace15.getDate() - 15);

      const { data } = await db
        .from('pedidos')
        .select('*')
        .eq('cafeteria_id', cafeteria.id)
        .gte('fecha', hace15.toISOString())
        .order('fecha', { ascending: false });

      pedidosDias = {};
      (data || []).forEach(p => {
        const dia = (p.fecha_entrega || p.fecha).slice(0, 10);
        if (!pedidosDias[dia]) pedidosDias[dia] = p;
      });
    }

    // ─────────────────────────────────────────
    // Renderizar toda la app
    // ─────────────────────────────────────────
    function renderizarApp() {
      const contenido = document.getElementById('contenido');
      contenido.innerHTML = '';

      // 1. Calendario
      const fechaWrap = document.createElement('div');
      fechaWrap.className = 'fecha-wrap';
      fechaWrap.innerHTML = '<span class="fecha-label">Fecha de entrega</span>';
      fechaWrap.appendChild(crearCalendario());

      const fechaTexto = document.createElement('div');
      fechaTexto.className = 'fecha-seleccionada-texto';
      fechaTexto.id = 'fechaTexto';
      fechaTexto.textContent = 'Selecciona una fecha de entrega';
      fechaWrap.appendChild(fechaTexto);

      contenido.appendChild(fechaWrap);

      // 2. Alerta pedido ya enviado
      const alerta = document.createElement('div');
      alerta.className = 'alerta-enviado';
      alerta.id = 'alertaEnviado';
      alerta.innerHTML = `
        <div class="alerta-enviado-titulo">✓ Ya tienes un pedido para este día</div>
        <div class="alerta-enviado-texto" id="alertaTexto"></div>
      `;
      contenido.appendChild(alerta);

      // 3. Bloques por sucursal
      const pedidoWrap = document.createElement('div');
      pedidoWrap.className = 'pedido-wrap';
      pedidoWrap.id = 'pedidoWrap';

      const tieneSucursales = sucursales.length > 1 || sucursales[0] !== '';

      sucursales.forEach(s => {
        const bloque = document.createElement('div');
        bloque.className = 'sucursal-bloque';
        bloque.id = `bloque-${s}`;

        if (tieneSucursales) {
          bloque.innerHTML = `
            <div class="sucursal-header">
              <div class="sucursal-dot"></div>
              <div class="sucursal-nombre">${s}</div>
              <div class="sucursal-total" id="total-${s}">0</div>
            </div>
          `;
        }

        productos.forEach(p => {
          const key  = `${s}::${p.id}`;
          const fila = document.createElement('div');
          fila.className = 'producto-fila';
          fila.innerHTML = `
            <div class="producto-nombre">${p.nombre}</div>
            <div class="cantidad">
              <button class="cantidad-btn" data-key="${key}" data-accion="dec">−</button>
              <div class="cantidad-num" id="num-${key}" data-key="${key}">0</div>
              <button class="cantidad-btn" data-key="${key}" data-accion="inc">+</button>
            </div>
          `;
          bloque.appendChild(fila);
        });

        pedidoWrap.appendChild(bloque);
      });

      contenido.appendChild(pedidoWrap);

      // 4. Notas
      const notasWrap = document.createElement('div');
      notasWrap.className = 'notas-wrap';
      notasWrap.innerHTML = `
        <label class="notas-label" for="campoNotas">Notas</label>
        <textarea class="notas-input" id="campoNotas"
          placeholder="Alergias, preferencias, indicaciones especiales…"></textarea>
      `;
      contenido.appendChild(notasWrap);

      // Eventos: + y −
      contenido.querySelectorAll('.cantidad-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.key;
          if (btn.dataset.accion === 'inc') {
            cantidades[key] = Math.min((cantidades[key] || 0) + 1, 99);
          } else {
            cantidades[key] = Math.max((cantidades[key] || 0) - 1, 0);
          }
          actualizarNum(key);
        });
      });

      // Eventos: tocar número abre teclado
      contenido.querySelectorAll('.cantidad-num').forEach(el => {
        el.addEventListener('click', () => abrirTeclado(el.dataset.key));
      });
    }

    // ─────────────────────────────────────────
    // Calendario custom
    // ─────────────────────────────────────────
    function crearCalendario() {
      const cal = document.createElement('div');
      cal.className = 'calendario';
      cal.id = 'calendario';
      renderizarCalendario(cal);
      return cal;
    }

    function renderizarCalendario(cal) {
      if (!cal) cal = document.getElementById('calendario');
      if (!cal) return;

      const hoy    = new Date();
      const año    = calMesActual.getFullYear();
      const mes    = calMesActual.getMonth();

      const nombresMes = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                          'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

      const primerDia     = new Date(año, mes, 1).getDay();  // 0=dom
      const diasEnMes     = new Date(año, mes + 1, 0).getDate();
      const offsetLunes   = primerDia === 0 ? 6 : primerDia - 1; // ajustar a lunes

      let html = `
        <div class="cal-header">
          <button class="cal-nav" id="calPrev">‹</button>
          <div class="cal-mes">${nombresMes[mes]} ${año}</div>
          <button class="cal-nav" id="calNext">›</button>
        </div>
        <div class="cal-dias-semana">
          <div class="cal-dia-semana">L</div>
          <div class="cal-dia-semana">M</div>
          <div class="cal-dia-semana">M</div>
          <div class="cal-dia-semana">J</div>
          <div class="cal-dia-semana">V</div>
          <div class="cal-dia-semana">S</div>
          <div class="cal-dia-semana">D</div>
        </div>
        <div class="cal-grid">
      `;

      // Celdas vacías al inicio
      for (let i = 0; i < offsetLunes; i++) {
        html += '<div class="cal-celda"></div>';
      }

      for (let d = 1; d <= diasEnMes; d++) {
        const fecha   = `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const esHoy   = fecha === hoy.toISOString().slice(0,10);
        const esPasado = new Date(fecha) < new Date(hoy.toISOString().slice(0,10));
        const tienePedido = !!pedidosDias[fecha];
        const seleccionado = fecha === fechaSeleccionada;

        let clases = 'cal-celda';
        if (seleccionado)      clases += ' seleccionado';
        else if (esPasado)     clases += ' pasado';
        else if (tienePedido)  clases += ' con-pedido';
        else if (esHoy)        clases += ' hoy disponible';
        else                   clases += ' disponible';

        const clickeable = !esPasado ? `data-fecha="${fecha}"` : '';
        html += `<div class="${clases}" ${clickeable}>${d}</div>`;
      }

      html += '</div>';
      cal.innerHTML = html;

      // Navegación de meses
      cal.querySelector('#calPrev').addEventListener('click', () => {
        calMesActual.setMonth(calMesActual.getMonth() - 1);
        renderizarCalendario();
      });

      cal.querySelector('#calNext').addEventListener('click', () => {
        calMesActual.setMonth(calMesActual.getMonth() + 1);
        renderizarCalendario();
      });

      // Seleccionar día
      cal.querySelectorAll('.cal-celda[data-fecha]').forEach(celda => {
        celda.addEventListener('click', () => seleccionarFecha(celda.dataset.fecha));
      });
    }

    function seleccionarFecha(fecha) {
      fechaSeleccionada = fecha;
      renderizarCalendario();

      const fechaDate = new Date(fecha + 'T12:00:00');
      const nombreFecha = fechaDate.toLocaleDateString('es-MX', {
        weekday: 'long', day: 'numeric', month: 'long'
      });

      const textoEl = document.getElementById('fechaTexto');
      textoEl.innerHTML = `Entrega: <span>${nombreFecha}</span>`;

      // Verificar si ya hay pedido ese día
      const alerta = document.getElementById('alertaEnviado');
      const pedidoExistente = pedidosDias[fecha];

      if (pedidoExistente) {
        alerta.classList.add('visible');
        document.getElementById('alertaTexto').textContent =
          `Ya enviaste un pedido para este día. Puedes ver el detalle en "Mis pedidos".`;
        document.getElementById('pedidoWrap').style.opacity = '0.4';
        document.getElementById('pedidoWrap').style.pointerEvents = 'none';
        document.getElementById('barra').classList.remove('visible');
      } else {
        alerta.classList.remove('visible');
        document.getElementById('pedidoWrap').style.opacity = '1';
        document.getElementById('pedidoWrap').style.pointerEvents = '';
        actualizarBarra();
      }
    }

    // ─────────────────────────────────────────
    // Actualizar número y barra
    // ─────────────────────────────────────────
    function actualizarNum(key) {
      const el = document.getElementById(`num-${key}`);
      if (!el) return;
      const val = cantidades[key] || 0;
      el.textContent = val;
      el.classList.toggle('activo', val > 0);

      // Actualizar total de sucursal
      const sucursal = key.split('::')[0];
      if (sucursal !== '') {
        const totalSuc = Object.entries(cantidades)
          .filter(([k]) => k.startsWith(`${sucursal}::`))
          .reduce((a, [, v]) => a + v, 0);
        const totalEl = document.getElementById(`total-${sucursal}`);
        if (totalEl) totalEl.textContent = totalSuc;
      }

      actualizarBarra();
    }

    function actualizarBarra() {
      if (!fechaSeleccionada || pedidosDias[fechaSeleccionada]) return;

      const total = Object.values(cantidades).reduce((a, b) => a + b, 0);
      document.getElementById('barraCuenta').textContent =
        `${total} ${total === 1 ? 'producto' : 'productos'}`;
      document.getElementById('barra').classList.toggle('visible', total > 0);
    }

    // ─────────────────────────────────────────
    // Teclado numérico
    // ─────────────────────────────────────────
    function abrirTeclado(key) {
      tecladoKey   = key;
      tecladoValor = cantidades[key] > 0 ? String(cantidades[key]) : '';

      const [sucursal, prodId] = key.split('::');
      const prod = productos.find(p => p.id === prodId);

      document.getElementById('tecladoSucursal').textContent =
        sucursal && sucursal !== '' ? sucursal : '';
      document.getElementById('tecladoNombre').textContent  = prod?.nombre || '';
      document.getElementById('tecladoPantalla').textContent = tecladoValor || '0';
      document.getElementById('tecladoFondo').classList.add('visible');
    }

    function cerrarTeclado() {
      document.getElementById('tecladoFondo').classList.remove('visible');
      tecladoKey = null; tecladoValor = '';
    }

    function procesarTecla(k) {
      if (k === 'del') {
        tecladoValor = tecladoValor.slice(0, -1);
      } else if (k === 'ok') {
        if (tecladoKey !== null) {
          cantidades[tecladoKey] = parseInt(tecladoValor) || 0;
          actualizarNum(tecladoKey);
        }
        cerrarTeclado();
        return;
      } else {
        if (tecladoValor.length >= 2) return;
        tecladoValor += k;
        if (tecladoValor.startsWith('0') && tecladoValor.length > 1) {
          tecladoValor = tecladoValor.slice(1);
        }
      }
      document.getElementById('tecladoPantalla').textContent = tecladoValor || '0';
    }

    document.getElementById('tecladoFondo').addEventListener('click', e => {
      if (e.target === document.getElementById('tecladoFondo')) cerrarTeclado();
    });

    document.querySelector('.teclado-grid').addEventListener('click', e => {
      const tecla = e.target.closest('.tecla');
      if (tecla) procesarTecla(tecla.dataset.k);
    });

    // ─────────────────────────────────────────
    // Enviar pedido
    // ─────────────────────────────────────────
    document.getElementById('btnEnviar').addEventListener('click', async () => {
      if (!fechaSeleccionada) {
        mostrarToast('Selecciona una fecha de entrega');
        return;
      }

      if (pedidosDias[fechaSeleccionada]) {
        mostrarToast('Ya existe un pedido para ese día');
        return;
      }

      // Construir productos por sucursal
      const tieneSucursales = sucursales.length > 1 || sucursales[0] !== '';
      let productosPorSucursal = [];
      let totalGlobal = 0;

      sucursales.forEach(s => {
        const items = productos
          .filter(p => (cantidades[`${s}::${p.id}`] || 0) > 0)
          .map(p => ({ id: p.id, nombre: p.nombre, cantidad: cantidades[`${s}::${p.id}`] }));

        if (items.length) {
          productosPorSucursal.push({ sucursal: s, items });
          totalGlobal += items.reduce((a, p) => a + p.cantidad, 0);
        }
      });

      if (!totalGlobal) {
        mostrarToast('Agrega al menos un producto');
        return;
      }

      const btn = document.getElementById('btnEnviar');
      btn.disabled = true;
      btn.textContent = 'Guardando…';

      const notas = document.getElementById('campoNotas')?.value.trim() || '';

      try {
        const { error } = await db.from('pedidos').insert([{
          cafeteria_id:       cafeteria.id,
          cafeteria_nombre:   cafeteria.nombre,
          productos:          productosPorSucursal,
          notas,
          fecha:              new Date().toISOString(),
          fecha_entrega:      fechaSeleccionada,
        }]);

        if (error) throw error;

        pedidoActual = {
          cafeteria:   cafeteria.nombre,
          sucursales:  productosPorSucursal,
          notas,
          fecha:       fechaSeleccionada,
          tieneSucursales,
        };

        // Marcar día como enviado
        pedidosDias[fechaSeleccionada] = { fecha_entrega: fechaSeleccionada, productos: productosPorSucursal };
        renderizarCalendario();
        seleccionarFecha(fechaSeleccionada);

        document.getElementById('modalFondo').classList.add('visible');

      } catch (err) {
        console.error(err);
        mostrarToast('Error al guardar. Intenta de nuevo.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Confirmar pedido';
      }
    });

    // ─────────────────────────────────────────
    // WhatsApp
    // ─────────────────────────────────────────
    document.getElementById('btnWhatsApp').addEventListener('click', () => {
      if (!pedidoActual) return;

      const fechaDate = new Date(pedidoActual.fecha + 'T12:00:00');
      const fechaStr  = fechaDate.toLocaleDateString('es-MX', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
      });

      let msg = `🥖 *Pedido Panfitrión*\n`;
      msg    += `📍 *${pedidoActual.cafeteria}*\n`;
      msg    += `📅 Entrega: ${fechaStr}\n`;

      pedidoActual.sucursales.forEach(({ sucursal, items }) => {
        if (pedidoActual.tieneSucursales && sucursal) {
          msg += `\n🏢 *${sucursal}*\n`;
        } else {
          msg += `\n*Productos:*\n`;
        }
        items.forEach(p => { msg += `• ${p.nombre}: *${p.cantidad}*\n`; });
      });

      if (pedidoActual.notas) {
        msg += `\n📝 *Notas:* ${pedidoActual.notas}`;
      }

      if (navigator.share) {
        navigator.share({ title: 'Pedido Panfitrión', text: msg }).catch(() => {});
      } else {
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
      }
    });

    document.getElementById('btnOtroPedido').addEventListener('click', () => {
      document.getElementById('modalFondo').classList.remove('visible');
      // Resetear cantidades
      Object.keys(cantidades).forEach(k => { cantidades[k] = 0; });
      document.querySelectorAll('.cantidad-num').forEach(el => {
        el.textContent = '0';
        el.classList.remove('activo');
      });
      document.querySelectorAll('.sucursal-total').forEach(el => { el.textContent = '0'; });
      if (document.getElementById('campoNotas')) document.getElementById('campoNotas').value = '';
      document.getElementById('barra').classList.remove('visible');
      pedidoActual = null;
    });

    // ─────────────────────────────────────────
    // Historial (últimos 15 días)
    // ─────────────────────────────────────────
    document.getElementById('btnHistorial').addEventListener('click', async () => {
      document.getElementById('historialFondo').classList.add('visible');
      await renderizarHistorial();
    });

    document.getElementById('btnCerrarHistorial').addEventListener('click', () => {
      document.getElementById('historialFondo').classList.remove('visible');
    });

    document.getElementById('historialFondo').addEventListener('click', e => {
      if (e.target === document.getElementById('historialFondo')) {
        document.getElementById('historialFondo').classList.remove('visible');
      }
    });

    async function renderizarHistorial() {
      const contenidoH = document.getElementById('historialContenido');
      contenidoH.innerHTML = '<div class="historial-vacio">Cargando…</div>';

      const hace15 = new Date();
      hace15.setDate(hace15.getDate() - 15);

      const { data, error } = await db
        .from('pedidos')
        .select('*')
        .eq('cafeteria_id', cafeteria.id)
        .gte('fecha', hace15.toISOString())
        .order('fecha', { ascending: false });

      if (error || !data?.length) {
        contenidoH.innerHTML = '<div class="historial-vacio">No tienes pedidos en los últimos 15 días.</div>';
        return;
      }

      contenidoH.innerHTML = data.map(pedido => {
        const fechaPedido = new Date(pedido.fecha).toLocaleDateString('es-MX', {
          day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit',
        });

        const fechaEntrega = pedido.fecha_entrega
          ? new Date(pedido.fecha_entrega + 'T12:00:00').toLocaleDateString('es-MX', {
              weekday: 'long', day: 'numeric', month: 'long',
            })
          : null;

        // Renderizar productos — puede ser array plano o array por sucursal
        let productosHtml = '';
        const prods = pedido.productos || [];

        // Detectar si tiene estructura de sucursales
        const conSucursales = prods.length && prods[0].sucursal !== undefined;

        if (conSucursales) {
          prods.forEach(({ sucursal, items }) => {
            if (sucursal) {
              productosHtml += `<div class="pedido-card-sucursal">${sucursal}</div>`;
            }
            productosHtml += '<div class="pedido-card-productos">';
            (items || []).forEach(p => {
              productosHtml += `${p.nombre}: <span>×${p.cantidad}</span><br>`;
            });
            productosHtml += '</div>';
          });
        } else {
          // Formato antiguo: array plano
          productosHtml += '<div class="pedido-card-productos">';
          prods.forEach(p => {
            productosHtml += `${p.nombre}: <span>×${p.cantidad}</span><br>`;
          });
          productosHtml += '</div>';
        }

        return `
          <div class="pedido-card">
            <div class="pedido-card-header">
              <div>
                <div class="pedido-card-fecha">Enviado el ${fechaPedido}</div>
                ${fechaEntrega ? `<div class="pedido-card-entrega">Entrega: ${fechaEntrega}</div>` : ''}
              </div>
              <div class="pedido-card-badge">${cafeteria.nombre}</div>
            </div>
            ${productosHtml}
            ${pedido.notas ? `<div class="pedido-card-notas">📝 ${pedido.notas}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    // ─────────────────────────────────────────
    // Utilidades
    // ─────────────────────────────────────────
    function mostrarToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('visible');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('visible'), 3000);
    }

    function mostrarError(titulo, texto) {
      document.getElementById('cafeNombre').textContent = titulo;
      document.getElementById('contenido').innerHTML = `
        <div class="estado">
          <div class="icono-grande">🍞</div>
          <h2>${titulo}</h2>
          <p>${texto}</p>
        </div>
      `;
    }

    // ─────────────────────────────────────────
    // Iniciar
    // ─────────────────────────────────────────
    init();
  </script>
</body>
</html>
