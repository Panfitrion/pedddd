<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panfitrión — Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --negro: #080808;
    --negro2: #0f0f0f;
    --negro3: #161616;
    --negro4: #1e1e1e;
    --gris1: #252525;
    --gris2: #333333;
    --gris3: #4a4a4a;
    --gris4: #7a7a7a;
    --gris5: #a0a0a0;
    --dorado: #c9a84c;
    --dorado2: #b8963c;
    --dorado3: #e2c06a;
    --blanco: #f0ece3;
    --blanco2: #e4dfd5;
    --sombra: 0 8px 32px rgba(0,0,0,0.5);
    --sombra-s: 0 2px 8px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--negro);
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 11px;
    min-width: 0;
  }

  .logo-wrap {
    position: relative;
    width: 38px;
    height: 38px;
    flex-shrink: 0;
  }

  .logo-wrap img {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
    display: none;
  }

  .logo-placeholder {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--dorado) 0%, var(--dorado2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--negro);
    box-shadow: 0 2px 10px rgba(201,168,76,0.3);
  }

  .header-titles {
    min-width: 0;
  }

  .marca-nombre {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--dorado);
    line-height: 1.1;
    letter-spacing: 0.01em;
  }

  .cafe-nombre {
    font-size: 11px;
    color: var(--gris4);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
    letter-spacing: 0.02em;
    margin-top: 1px;
  }

  .btn-historial {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--gris5);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 13px;
    border-radius: 20px;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
    letter-spacing: 0.02em;
  }

  .btn-historial:active { border-color: var(--dorado); color: var(--dorado); }

  /* ── MAIN ── */
  .main {
    padding: 24px 16px 140px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── CALENDARIO SHEET ── */
  .cal-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 300;
    background: var(--negro2);
    border-top: 1px solid var(--gris1);
    border-radius: 20px 20px 0 0;
    padding: 16px 16px max(20px, env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-width: 480px;
    margin: 0 auto;
  }

  .cal-sheet.visible { transform: translateY(0); }

  .cal-sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cal-sheet-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--blanco);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-right: 12px;
  }

  .btn-cerrar-cal {
    background: var(--gris1);
    border: none;
    color: var(--gris4);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.1s;
  }

  .btn-cerrar-cal:active { background: var(--gris2); }

  .calendario {
    background: var(--negro3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .cal-mes {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--blanco);
    text-transform: capitalize;
    letter-spacing: 0.01em;
  }

  .cal-nav {
    background: var(--negro4);
    border: none;
    color: var(--gris5);
    font-size: 18px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
  }

  .cal-nav:active { color: var(--dorado); background: var(--gris1); }

  .cal-semana {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 12px 10px 4px;
    gap: 2px;
  }

  .cal-dia-label {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--gris3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 4px 10px 14px;
    gap: 3px;
  }

  .cal-dia {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    border: 1.5px solid transparent;
    color: var(--blanco);
    -webkit-user-select: none;
    user-select: none;
  }

  .cal-dia.vacio { cursor: default; }

  .cal-dia.pasado {
    color: var(--gris1);
    cursor: not-allowed;
  }

  .cal-dia.hoy {
    color: var(--dorado);
    font-weight: 700;
  }

  .cal-dia.hoy::after {
    content: '';
    position: absolute;
    bottom: 3px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--dorado);
  }

  .cal-dia.con-pedido {
    border-color: rgba(201,168,76,0.2);
    cursor: not-allowed;
    color: var(--gris3);
  }

  .cal-dia.seleccionado {
    background: var(--dorado);
    color: #000 !important;
    font-weight: 700;
    border-color: transparent;
    box-shadow: 0 2px 10px rgba(201,168,76,0.35);
  }

  .cal-dia.seleccionado::after { display: none; }

  .cal-dia:not(.pasado):not(.con-pedido):not(.vacio):not(.seleccionado):active {
    background: var(--gris1);
  }

  /* ── CHIP FECHA POR PRODUCTO ── */
  .fecha-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 5px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.22);
    color: var(--dorado3);
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    padding: 3px 10px 3px 8px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.01em;
  }

  .fecha-chip:active { background: rgba(201,168,76,0.18); }

  .fecha-chip.sin-fecha {
    color: var(--gris4);
    border-color: rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
  }

  .fecha-chip.sin-fecha:active { background: var(--gris1); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--gris4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  /* ── PRODUCTOS ── */
  .productos-section {
    margin-bottom: 28px;
  }

  .sucursal-bloque {
    margin-bottom: 20px;
  }

  .sucursal-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .sucursal-punto {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--dorado);
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(201,168,76,0.5);
  }

  .sucursal-nombre {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--blanco);
    flex: 1;
    letter-spacing: 0.01em;
  }

  .sucursal-total {
    font-size: 11px;
    color: var(--gris4);
    font-weight: 500;
  }

  /* ── TABLA MULTI-SUCURSAL ── */
  .tabla-suc-wrap {
    background: var(--negro3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .tabla-suc {
    width: 100%;
    border-collapse: collapse;
    min-width: max-content;
  }

  .tabla-suc thead tr {
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .tabla-suc th {
    padding: 12px 12px;
    font-size: 10px;
    font-weight: 600;
    color: var(--gris4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    text-align: center;
  }

  .tabla-suc th:first-child {
    text-align: left;
    min-width: 110px;
    padding-left: 16px;
  }

  .tabla-suc td {
    padding: 10px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    text-align: center;
    vertical-align: middle;
  }

  .tabla-suc td:first-child {
    text-align: left;
    font-size: 13px;
    color: var(--blanco);
    padding-left: 16px;
    white-space: nowrap;
  }

  .tabla-suc tr:last-child td { border-bottom: none; }
  .tabla-suc tbody tr:hover td { background: rgba(255,255,255,0.02); }

  .tabla-suc tfoot tr {
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.015);
  }

  .tabla-suc tfoot td {
    font-size: 10px;
    font-weight: 600;
    color: var(--gris4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 10px;
    border-bottom: none;
  }

  .tabla-suc tfoot td:first-child { padding-left: 16px; }

  .tfoot-total {
    color: var(--dorado) !important;
    font-family: 'Playfair Display', serif;
    font-size: 16px !important;
    font-weight: 700 !important;
  }

  /* Ctrl cantidad compacto para tabla */
  .cant-ctrl-tabla {
    display: inline-flex;
    align-items: center;
    background: var(--negro4);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    overflow: hidden;
  }

  .btn-cant-t {
    background: none;
    border: none;
    color: var(--gris5);
    font-size: 17px;
    font-weight: 300;
    width: 30px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, color 0.1s;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-cant-t:active { background: var(--gris1); color: var(--dorado); }

  .cant-num-t {
    min-width: 28px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--blanco);
    cursor: pointer;
    padding: 0 2px;
  }

  .cant-num-t.activo { color: var(--dorado); }

  .sucursal-total span {
    color: var(--dorado);
    font-weight: 600;
  }

  .producto-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    background: var(--negro3);
    border: 1px solid rgba(255,255,255,0.055);
    border-radius: 14px;
    margin-bottom: 8px;
    gap: 12px;
    transition: border-color 0.15s;
  }

  .producto-row:last-child { margin-bottom: 0; }

  .producto-nombre {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
    font-size: 14px;
    font-weight: 400;
    color: var(--blanco);
    flex: 1;
    min-width: 0;
    letter-spacing: 0.01em;
  }

  .cantidad-ctrl {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--negro4);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .btn-cant {
    background: none;
    border: none;
    color: var(--gris5);
    font-size: 20px;
    font-weight: 300;
    width: 38px;
    height: 38px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, color 0.1s;
    line-height: 1;
  }

  .btn-cant:active { background: var(--gris1); color: var(--dorado); }

  .cant-num {
    min-width: 36px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--blanco);
    cursor: pointer;
    padding: 0 2px;
  }

  .cant-num.activo {
    color: var(--dorado);
  }

  /* ── NOTAS ── */
  .notas-section {
    margin-bottom: 28px;
  }

  .notas-textarea {
    width: 100%;
    background: var(--negro3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 14px 16px;
    resize: none;
    min-height: 80px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.6;
  }

  .notas-textarea:focus {
    border-color: rgba(201,168,76,0.4);
  }

  .notas-textarea::placeholder { color: var(--gris3); }

  /* ── BARRA STICKY ENVÍO ── */
  .barra-envio {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 14px 18px max(16px, env(safe-area-inset-bottom));
    background: rgba(8,8,8,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 14px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-width: 100%;
  }

  .barra-envio.visible {
    transform: translateY(0);
  }

  .barra-total {
    flex: 1;
    min-width: 0;
  }

  .barra-total-label {
    font-size: 10px;
    color: var(--gris4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .barra-total-num {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--dorado);
    line-height: 1.1;
    margin-top: 1px;
  }

  .barra-total-num span {
    font-size: 12px;
    color: var(--gris4);
    font-weight: 400;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-confirmar {
    background: linear-gradient(135deg, var(--dorado) 0%, var(--dorado2) 100%);
    border: none;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 22px;
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }

  .btn-confirmar:active { opacity: 0.85; transform: scale(0.98); }
  .btn-confirmar:disabled {
    background: var(--gris1);
    color: var(--gris3);
    cursor: not-allowed;
    transform: none;
    opacity: 1;
  }

  /* ── TECLADO NUMÉRICO ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .teclado-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 300;
    background: var(--negro2);
    border-top: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px 24px 0 0;
    padding: 16px 16px max(20px, env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-width: 480px;
    margin: 0 auto;
  }

  .teclado-sheet.visible {
    transform: translateY(0);
  }

  .teclado-handle {
    width: 32px;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .teclado-producto {
    text-align: center;
    font-size: 11px;
    color: var(--gris4);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .teclado-display {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 700;
    color: var(--blanco);
    line-height: 1;
    margin-bottom: 20px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.02em;
  }

  .teclado-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }

  .teclado-btn {
    background: var(--negro3);
    border: 1px solid rgba(255,255,255,0.05);
    color: var(--blanco);
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    height: 58px;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .teclado-btn:active { background: var(--gris1); }

  .teclado-btn.borrar {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--gris4);
  }

  .teclado-btn.cero { grid-column: span 2; }

  .btn-teclado-ok {
    width: 100%;
    background: linear-gradient(135deg, var(--dorado) 0%, var(--dorado2) 100%);
    border: none;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    height: 52px;
    border-radius: 14px;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.02em;
  }

  .btn-teclado-ok:active { opacity: 0.85; }

  /* ── MODAL ÉXITO ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal-card {
    background: var(--negro3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 32px 24px 28px;
    width: 100%;
    max-width: 360px;
    transform: scale(0.92) translateY(8px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    text-align: center;
    box-shadow: var(--sombra);
  }

  .modal-overlay.visible .modal-card {

<script>
  // ── CONFIG ──
  const SUPABASE_URL = 'https://wttdrnftxmdqnfauhkkp.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0dGRybmZ0eG1kcW5mYXVoa2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjI5NzUsImV4cCI6MjA5MDUzODk3NX0.1NiCaHaEZPsa85cbZVC1iAxDu1FbQ7tiM-VBt_e68Qk';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── ESTADO ──
  let cafeteria = null;         // datos desde Supabase
  let pedidosExistentes = [];   // pedidos de los últimos 15 días
  let fechaPorProd = {};        // prodId → 'YYYY-MM-DD'
  let calTarget = null;         // prodId al que se le está asignando fecha
  let calAnio = 0;
  let calMes = 0;
  let cantidades = {};          // { "sucursal|prodId": cantidad }
  let tecladoTarget = null;     // { sucursalKey, prodId, nombre }
  let tecladoValor = '';
  let ultimoPedidoData = null;  // para compartir por WA

  // ── ELEMENTOS ──
  const loadingScreen   = document.getElementById('loadingScreen');
  const errorScreen     = document.getElementById('errorScreen');
  const errorMsg        = document.getElementById('errorMsg');
  const mainContent     = document.getElementById('mainContent');
  const cafeNombreEl    = document.getElementById('cafeNombreHeader');
  const logoImg         = document.getElementById('logoImg');
  const logoLetra       = document.getElementById('logoLetra');
  const calMesEl        = document.getElementById('calMes');
  const calGrid         = document.getElementById('calGrid');
  const calPrev         = document.getElementById('calPrev');
  const calNext         = document.getElementById('calNext');
  const productosEl     = document.getElementById('productosContainer');
  const notasInput      = document.getElementById('notasInput');
  const barraEnvio      = document.getElementById('barraEnvio');
  const barraTotalEl    = document.getElementById('barraTotalNum');
  const btnConfirmar    = document.getElementById('btnConfirmar');
  const tecladoOverlay  = document.getElementById('tecladoOverlay');
  const tecladoSheet    = document.getElementById('tecladoSheet');
  const tecladoNombreEl = document.getElementById('tecladoProductoNombre');
  const tecladoDisplay  = document.getElementById('tecladoDisplay');
  const tecladoGrid     = document.getElementById('tecladoGrid');
  const btnTecladoOk    = document.getElementById('btnTecladoOk');
  const modalExito      = document.getElementById('modalExito');
  const modalSubtituloEl= document.getElementById('modalSubtitulo');
  const btnWhatsapp     = document.getElementById('btnWhatsapp');
  const btnCerrarModal  = document.getElementById('btnCerrarModal');
  const drawerOverlay   = document.getElementById('drawerOverlay');
  const drawerHistorial = document.getElementById('drawerHistorial');
  const drawerContent   = document.getElementById('drawerContent');
  const btnHistorial    = document.getElementById('btnHistorial');
  const btnCerrarDrawer = document.getElementById('btnCerrarDrawer');
  const alertToast      = document.getElementById('alertToast');
  const calOverlayEl    = document.getElementById('calOverlay');
  const calSheetEl      = document.getElementById('calSheet');
  const calSheetTituloEl = document.getElementById('calSheetTitulo');
  const btnCerrarCalEl  = document.getElementById('btnCerrarCal');

  // ── LOGO FALLBACK ──
  logoImg.addEventListener('load', () => {
    logoImg.style.display = 'block';
    logoLetra.style.display = 'none';
  });
  logoImg.addEventListener('error', () => {
    logoImg.style.display = 'none';
    logoLetra.style.display = 'flex';
  });

  // ── UTILS ──
  const DIAS_ES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function fechaStr(d) {
    // YYYY-MM-DD en hora local
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }

  function tienePedidoEnFecha(fecha) {
    const str = fechaStr(fecha);
    return pedidosExistentes.some(p => p.fecha_entrega === str);
  }

  function toast(msg, dur=2800) {
    alertToast.textContent = msg;
    alertToast.classList.add('visible');
    setTimeout(() => alertToast.classList.remove('visible'), dur);
  }

  // ── SLUG DESDE URL ──
  function getSlug() {
    const params = new URLSearchParams(window.location.search);
    return params.get('cafe') || '';
  }

  // ── INIT ──
  async function init() {
    const slug = getSlug();
    if (!slug) {
      mostrarError('No se especificó una cafetería. Verifica tu link.');
      return;
    }

    try {
      const { data, error } = await db
        .from('cafeterias')
        .select('*')
        .eq('slug', slug)
        .single();

      if (error || !data) {
        mostrarError(`No se encontró la cafetería "${slug}".`);
        return;
      }

      cafeteria = data;
      cafeNombreEl.textContent = cafeteria.nombre;
      document.title = `${cafeteria.nombre} — Panfitrión`;

      await cargarPedidosRecientes();
      initCalendario();
      renderProductos();

      loadingScreen.style.display = 'none';
      mainContent.style.display = '';

    } catch(e) {
      mostrarError('Error de conexión. Intenta de nuevo.');
    }
  }

  function mostrarError(msg) {
    loadingScreen.style.display = 'none';
    errorMsg.textContent = msg;
    errorScreen.style.display = 'flex';
  }

  async function cargarPedidosRecientes() {
    const hace15 = new Date();
    hace15.setDate(hace15.getDate() - 15);
    const { data } = await db
      .from('pedidos')
      .select('*')
      .eq('cafeteria_id', cafeteria.id)
      .gte('fecha_entrega', fechaStr(hace15))
      .order('fecha', { ascending: false });
    pedidosExistentes = data || [];
  }

  // ── CALENDARIO ──
  function initCalendario() {
    const hoy = new Date();
    calAnio = hoy.getFullYear();
    calMes  = hoy.getMonth();
  }

  function dibujarCal() {
    const hoy = new Date();
    hoy.setHours(0,0,0,0);

    const nombreMes = MESES_ES[calMes];
    calMesEl.textContent = `${nombreMes.charAt(0).toUpperCase() + nombreMes.slice(1)} ${calAnio}`;

    const primerDia = new Date(calAnio, calMes, 1);
    let inicioSemana = primerDia.getDay();
    inicioSemana = (inicioSemana === 0) ? 6 : inicioSemana - 1;

    const diasEnMes = new Date(calAnio, calMes + 1, 0).getDate();

    calGrid.innerHTML = '';

    for (let i = 0; i < inicioSemana; i++) {
      const v = document.createElement('div');
      v.className = 'cal-dia vacio';
      calGrid.appendChild(v);
    }

    // Fecha seleccionada actualmente para el target
    const fechaTargetStr = calTarget ? (fechaPorProd[calTarget] || null) : null;

    for (let d = 1; d <= diasEnMes; d++) {
      const fecha = new Date(calAnio, calMes, d);
      fecha.setHours(0,0,0,0);
      const cel = document.createElement('div');
      cel.className = 'cal-dia';
      cel.textContent = d;

      const esHoy = fecha.getTime() === hoy.getTime();
      const esPasado = fecha < hoy;
      const conPedido = tienePedidoEnFecha(fecha);
      const esSeleccionado = fechaTargetStr && fechaStr(fecha) === fechaTargetStr;

      if (esPasado) cel.classList.add('pasado');
      else if (conPedido) cel.classList.add('con-pedido');
      else if (esSeleccionado) cel.classList.add('seleccionado');
      else if (esHoy) cel.classList.add('hoy');

      if (!esPasado && !conPedido) {
        cel.addEventListener('click', () => seleccionarFecha(fecha));
      }

      calGrid.appendChild(cel);
    }
  }

  calPrev.addEventListener('click', () => {
    calMes--;
    if (calMes < 0) { calMes = 11; calAnio--; }
    dibujarCal();
  });

  calNext.addEventListener('click', () => {
    calMes++;
    if (calMes > 11) { calMes = 0; calAnio++; }
    dibujarCal();
  });

  function seleccionarFecha(fecha) {
    if (tienePedidoEnFecha(fecha)) {
      toast('Ya tienes un pedido para esta fecha.');
      return;
    }
    if (!calTarget) return;
    fechaPorProd[calTarget] = fechaStr(fecha);
    actualizarChipFecha(calTarget);
    cerrarCalSheet();
    actualizarBarra();
  }

  function abrirCalSheet(prodId) {
    calTarget = prodId;
    // Posicionar el calendario en el mes de la fecha actual del producto (si tiene)
    const fechaActual = fechaPorProd[prodId];
    if (fechaActual) {
      const d = new Date(fechaActual + 'T00:00:00');
      calAnio = d.getFullYear();
      calMes = d.getMonth();
    } else {
      const hoy = new Date();
      calAnio = hoy.getFullYear();
      calMes = hoy.getMonth();
    }
    const prod = (cafeteria.menu || []).find(p => p.id === prodId);
    calSheetTituloEl.textContent = prod ? `Entrega: ${prod.nombre}` : 'Fecha de entrega';
    dibujarCal();
    calOverlayEl.classList.add('visible');
    calSheetEl.classList.add('visible');
  }

  function cerrarCalSheet() {
    calOverlayEl.classList.remove('visible');
    calSheetEl.classList.remove('visible');
    calTarget = null;
  }

  btnCerrarCalEl.addEventListener('click', cerrarCalSheet);
  calOverlayEl.addEventListener('click', cerrarCalSheet);

  function actualizarChipFecha(prodId) {
    const chips = document.querySelectorAll(`.fecha-chip[data-prod="${prodId}"]`);
    const fecha = fechaPorProd[prodId];
    const DIAS_CORTO = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const MESES_CORTO = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    chips.forEach(chip => {
      if (fecha) {
        const d = new Date(fecha + 'T00:00:00');
        chip.textContent = `📅 ${DIAS_CORTO[d.getDay()]} ${d.getDate()} ${MESES_CORTO[d.getMonth()]}`;
        chip.classList.remove('sin-fecha');
      } else {
        chip.textContent = '+ Fecha';
        chip.classList.add('sin-fecha');
      }
    });
  }

  // ── PRODUCTOS ──
  function renderProductos() {
    productosEl.innerHTML = '';
    cantidades = {};
    const menu = cafeteria.menu || [];
    const sucursales = cafeteria.sucursales || [];

    if (sucursales.length >= 2) {
      renderTablaSucursales(menu, sucursales);
    } else if (sucursales.length === 1) {
      // Una sola sucursal: lista normal sin bloque de sucursal
      const suc = sucursales[0];
      menu.forEach(prod => {
        const key = `${suc}|${prod.id}`;
        cantidades[key] = 0;
        productosEl.appendChild(crearFilaProducto(prod, suc));
      });
    } else {
      menu.forEach(prod => {
        const key = `|${prod.id}`;
        cantidades[key] = 0;
        productosEl.appendChild(crearFilaProducto(prod, ''));
      });
    }
  }

  function renderTablaSucursales(menu, sucursales) {
    // Inicializar cantidades
    sucursales.forEach(suc => {
      menu.forEach(prod => { cantidades[`${suc}|${prod.id}`] = 0; });
    });

    const wrap = document.createElement('div');
    wrap.className = 'tabla-suc-wrap';

    const table = document.createElement('table');
    table.className = 'tabla-suc';

    // THEAD
    const thead = document.createElement('thead');
    const thRow = document.createElement('tr');
    const thProd = document.createElement('th');
    thProd.textContent = 'Producto';
    thRow.appendChild(thProd);
    sucursales.forEach(suc => {
      const th = document.createElement('th');
      th.textContent = suc;
      thRow.appendChild(th);
    });
    thead.appendChild(thRow);
    table.appendChild(thead);

    // TBODY
    const tbody = document.createElement('tbody');
    menu.forEach(prod => {
      const tr = document.createElement('tr');
      const tdNombre = document.createElement('td');

      const nombreWrap = document.createElement('div');
      nombreWrap.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;gap:3px';

      const nombreSpan = document.createElement('span');
      nombreSpan.textContent = prod.nombre;

      const chip = document.createElement('button');
      chip.className = 'fecha-chip sin-fecha';
      chip.dataset.prod = prod.id;
      chip.textContent = '+ Fecha';
      chip.addEventListener('click', () => abrirCalSheet(prod.id));

      nombreWrap.appendChild(nombreSpan);
      nombreWrap.appendChild(chip);
      tdNombre.appendChild(nombreWrap);
      tr.appendChild(tdNombre);

      sucursales.forEach(suc => {
        const key = `${suc}|${prod.id}`;
        const td = document.createElement('td');

        const ctrl = document.createElement('div');
        ctrl.className = 'cant-ctrl-tabla';

        const btnMenos = document.createElement('button');
        btnMenos.className = 'btn-cant-t';
        btnMenos.textContent = '−';
        btnMenos.addEventListener('click', () => cambiarCantTabla(key, -1, suc));

        const numEl = document.createElement('div');
        numEl.className = 'cant-num-t';
        numEl.id = `cant-${key}`;
        numEl.textContent = '0';
        numEl.addEventListener('click', () => abrirTeclado(key, prod.nombre));

        const btnMas = document.createElement('button');
        btnMas.className = 'btn-cant-t';
        btnMas.textContent = '+';
        btnMas.addEventListener('click', () => cambiarCantTabla(key, 1, suc));

        ctrl.appendChild(btnMenos);
        ctrl.appendChild(numEl);
        ctrl.appendChild(btnMas);
        td.appendChild(ctrl);
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    // TFOOT — totales por sucursal
    const tfoot = document.createElement('tfoot');
    const tfRow = document.createElement('tr');
    const tdLabel = document.createElement('td');
    tdLabel.textContent = 'Total';
    tfRow.appendChild(tdLabel);
    sucursales.forEach(suc => {
      const td = document.createElement('td');
      td.className = 'tfoot-total';
      td.id = `suc-total-${suc}`;
      td.textContent = '0';
      tfRow.appendChild(td);
    });
    tfoot.appendChild(tfRow);
    table.appendChild(tfoot);

    wrap.appendChild(table);
    productosEl.appendChild(wrap);
  }

  function cambiarCantTabla(key, delta, suc) {
    const prodId = key.split('|')[1];
    const prod = (cafeteria.menu || []).find(p => p.id === prodId);
    const nuevo = Math.max(0, (cantidades[key] || 0) + delta);
    cantidades[key] = nuevo;
    actualizarCantUI(key);
    actualizarTotalSucursal(suc);
    if (nuevo > 0) aplicarFechaAuto(prod);
    actualizarBarra();
  }

  function crearFilaProducto(prod, suc) {
    const key = `${suc}|${prod.id}`;
    const fila = document.createElement('div');
    fila.className = 'producto-row';

    const nombreDiv = document.createElement('div');
    nombreDiv.className = 'producto-nombre';

    const nombreSpan = document.createElement('span');
    nombreSpan.textContent = prod.nombre;

    const chip = document.createElement('button');
    chip.className = 'fecha-chip sin-fecha';
    chip.dataset.prod = prod.id;
    chip.textContent = '+ Fecha';
    chip.addEventListener('click', () => abrirCalSheet(prod.id));

    nombreDiv.appendChild(nombreSpan);
    nombreDiv.appendChild(chip);

    const ctrl = document.createElement('div');
    ctrl.className = 'cantidad-ctrl';
    ctrl.innerHTML = `
      <button class="btn-cant btn-menos">−</button>
      <div class="cant-num" id="cant-${key}">0</div>
      <button class="btn-cant btn-mas">+</button>
    `;

    fila.appendChild(nombreDiv);
    fila.appendChild(ctrl);

    ctrl.querySelector('.btn-menos').addEventListener('click', () => cambiarCant(key, -1, prod, suc));
    ctrl.querySelector('.btn-mas').addEventListener('click', () => cambiarCant(key, 1, prod, suc));
    ctrl.querySelector('.cant-num').addEventListener('click', () => abrirTeclado(key, prod.nombre));

    return fila;
  }

  function cambiarCant(key, delta, prod, suc) {
    const nuevo = Math.max(0, (cantidades[key] || 0) + delta);
    cantidades[key] = nuevo;
    actualizarCantUI(key);
    if (suc) actualizarTotalSucursal(suc);
    if (nuevo > 0) aplicarFechaAuto(prod);
    actualizarBarra();
  }

  function aplicarFechaAuto(prod) {
    if (!prod || !prod.dias_entrega) return;
    if (fechaPorProd[prod.id]) return; // ya tiene fecha asignada
    const propuesta = new Date();
    propuesta.setHours(0, 0, 0, 0);
    propuesta.setDate(propuesta.getDate() + prod.dias_entrega);
    let intentos = 0;
    while (tienePedidoEnFecha(propuesta) && intentos < 30) {
      propuesta.setDate(propuesta.getDate() + 1);
      intentos++;
    }
    fechaPorProd[prod.id] = fechaStr(propuesta);
    actualizarChipFecha(prod.id);
    actualizarBarra();
  }

  function actualizarCantUI(key) {
    const el = document.getElementById(`cant-${key}`);
    if (el) {
      el.textContent = cantidades[key] || 0;
      el.classList.toggle('activo', (cantidades[key] || 0) > 0);
    }
  }

  function actualizarTotalSucursal(suc) {
    const total = Object.entries(cantidades)
      .filter(([k]) => k.startsWith(`${suc}|`))
      .reduce((s, [, v]) => s + (v || 0), 0);
    const el = document.getElementById(`suc-total-${suc}`);
    if (el) el.textContent = total;
  }

  function totalPiezas() {
    return Object.values(cantidades).reduce((s, v) => s + (v || 0), 0);
  }

  function actualizarBarra() {
    const total = totalPiezas();
    if (total === 0) {
      barraEnvio.classList.remove('visible');
      return;
    }
    barraEnvio.classList.add('visible');
    barraTotalEl.innerHTML = `${total} <span>piezas</span>`;

    // Productos activos (cantidad > 0)
    const prodIdsActivos = new Set();
    Object.entries(cantidades).forEach(([k, v]) => {
      if (v > 0) prodIdsActivos.add(k.split('|')[1]);
    });

    const sinFecha = [...prodIdsActivos].filter(id => !fechaPorProd[id]).length;

    if (sinFecha > 0) {
      btnConfirmar.disabled = true;
      btnConfirmar.textContent = `Falta fecha (${sinFecha})`;
    } else {
      const fechasActivas = new Set([...prodIdsActivos].map(id => fechaPorProd[id]).filter(Boolean));
      btnConfirmar.disabled = false;
      btnConfirmar.textContent = fechasActivas.size > 1
        ? `Confirmar ${fechasActivas.size} pedidos`
        : 'Confirmar pedido';
    }
  }

  // ── TECLADO NUMÉRICO ──
  function construirTecladoGrid() {
    tecladoGrid.innerHTML = '';
    const teclas = ['1','2','3','4','5','6','7','8','9','⌫','0',''];
    teclas.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'teclado-btn';
      if (t === '⌫') btn.classList.add('borrar');
      if (t === '0') btn.classList.add('cero');
      if (t === '') return; // espacio vacío (ocultado por cero span 2)
      btn.textContent = t;
      btn.addEventListener('click', () => presionarTecla(t));
      tecladoGrid.appendChild(btn);
    });
    // Rehacer: 1,2,3 / 4,5,6 / 7,8,9 / borrar,0(span2)
    tecladoGrid.innerHTML = '';
    const orden = ['1','2','3','4','5','6','7','8','9','⌫','0'];
    orden.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'teclado-btn';
      if (t === '⌫') btn.classList.add('borrar');
      if (t === '0') btn.classList.add('cero');
      btn.textContent = t;
      btn.addEventListener('click', () => presionarTecla(t));
      tecladoGrid.appendChild(btn);
    });
  }

  function presionarTecla(t) {
    if (t === '⌫') {
      tecladoValor = tecladoValor.slice(0, -1);
    } else {
      if (tecladoValor.length >= 3) return; // máx 999
      if (tecladoValor === '0') tecladoValor = t;
      else tecladoValor += t;
    }
    tecladoDisplay.textContent = tecladoValor || '0';
  }

  function abrirTeclado(key, nombre) {
    tecladoTarget = { key, nombre };
    tecladoValor = String(cantidades[key] || 0);
    if (tecladoValor === '0') tecladoValor = '';
    tecladoNombreEl.textContent = nombre;
    tecladoDisplay.textContent = tecladoValor || '0';
    construirTecladoGrid();
    tecladoOverlay.classList.add('visible');
    tecladoSheet.classList.add('visible');
  }

  function cerrarTeclado() {
    tecladoOverlay.classList.remove('visible');
    tecladoSheet.classList.remove('visible');
    tecladoTarget = null;
    tecladoValor = '';
  }

  btnTecladoOk.addEventListener('click', () => {
    if (!tecladoTarget) { cerrarTeclado(); return; }
    const val = parseInt(tecladoValor) || 0;
    cantidades[tecladoTarget.key] = val;
    actualizarCantUI(tecladoTarget.key);
    const partes = tecladoTarget.key.split('|');
    if (partes[0]) actualizarTotalSucursal(partes[0]);
    if (val > 0) {
      const prod = (cafeteria.menu || []).find(p => p.id === partes[1]);
      aplicarFechaAuto(prod);
    }
    actualizarBarra();
    cerrarTeclado();
  });

  tecladoOverlay.addEventListener('click', cerrarTeclado);

  // ── ENVIAR PEDIDO ──
  btnConfirmar.addEventListener('click', async () => {
    if (totalPiezas() === 0) { toast('Agrega al menos un producto.'); return; }

    const menu = cafeteria.menu || [];
    const sucursales = cafeteria.sucursales || [];

    // Agrupar productos por fecha
    const porFecha = {}; // 'YYYY-MM-DD' → [{ suc, prod, cant }]
    Object.entries(cantidades).forEach(([key, cant]) => {
      if (!cant || cant <= 0) return;
      const partes = key.split('|');
      const suc = partes[0];
      const prodId = partes[1];
      const fecha = fechaPorProd[prodId];
      if (!fecha) return;
      const prod = menu.find(p => p.id === prodId);
      if (!prod) return;
      if (!porFecha[fecha]) porFecha[fecha] = [];
      porFecha[fecha].push({ suc, prod, cant });
    });

    const fechas = Object.keys(porFecha).sort();
    if (fechas.length === 0) { toast('Agrega al menos un producto con fecha.'); return; }

    btnConfirmar.disabled = true;
    btnConfirmar.textContent = 'Enviando…';

    const pedidosACrear = fechas.map(fecha => {
      const items = porFecha[fecha];
      let productos;

      if (sucursales.length > 0) {
        const porSuc = {};
        items.forEach(({ suc, prod, cant }) => {
          if (!porSuc[suc]) porSuc[suc] = [];
          porSuc[suc].push({ id: prod.id, nombre: prod.nombre, cantidad: cant });
        });
        productos = sucursales
          .filter(s => porSuc[s] && porSuc[s].length > 0)
          .map(s => ({ sucursal: s, items: porSuc[s] }));
      } else {
        productos = items.map(({ prod, cant }) => ({ id: prod.id, nombre: prod.nombre, cantidad: cant }));
      }

      return {
        cafeteria_id:     cafeteria.id,
        cafeteria_nombre: cafeteria.nombre,
        productos,
        notas:            notasInput.value.trim(),
        fecha_entrega:    fecha,
        fecha:            new Date().toISOString()
      };
    });

    const { data, error } = await db.from('pedidos').insert(pedidosACrear).select();

    if (error) {
      toast('Error al enviar. Intenta de nuevo.');
      btnConfirmar.disabled = false;
      actualizarBarra();
      return;
    }

    ultimoPedidoData = pedidosACrear;
    (data || []).forEach((d, i) => pedidosExistentes.push({ ...pedidosACrear[i], id: d.id }));
    mostrarModalExito(pedidosACrear);
    resetFormulario();
  });

  function resetFormulario() {
    cantidades = {};
    fechaPorProd = {};
    renderProductos();
    notasInput.value = '';
    barraEnvio.classList.remove('visible');
    const hoy = new Date();
    calAnio = hoy.getFullYear();
    calMes = hoy.getMonth();
  }

  // ── MODAL ÉXITO ──
  function mostrarModalExito(pedidos) {
    const DIAS_CORTO = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const MESES_CORTO = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    if (pedidos.length === 1) {
      const p = pedidos[0];
      const d = new Date(p.fecha_entrega + 'T00:00:00');
      const partes = p.fecha_entrega.split('-');
      modalSubtituloEl.textContent = `Entrega el ${DIAS_ES[d.getDay()]} ${parseInt(partes[2])} de ${MESES_ES[parseInt(partes[1])-1]}.`;
    } else {
      const lineas = pedidos.map(p => {
        const d = new Date(p.fecha_entrega + 'T00:00:00');
        const partes = p.fecha_entrega.split('-');
        return `${DIAS_CORTO[d.getDay()]} ${parseInt(partes[2])} ${MESES_CORTO[parseInt(partes[1])-1]}`;
      }).join(' · ');
      modalSubtituloEl.textContent = `${pedidos.length} pedidos confirmados: ${lineas}`;
    }
    modalExito.classList.add('visible');
  }

  btnCerrarModal.addEventListener('click', () => {
    modalExito.classList.remove('visible');
    ultimoPedidoData = null;
  });

  modalExito.addEventListener('click', (e) => {
    if (e.target === modalExito) {
      modalExito.classList.remove('visible');
      ultimoPedidoData = null;
    }
  });

  // ── WHATSAPP ──
  btnWhatsapp.addEventListener('click', () => {
    if (!ultimoPedidoData) return;
    const texto = generarTextoWA(ultimoPedidoData);
    if (navigator.share) {
      navigator.share({ text: texto }).catch(() => {
        window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
      });
    } else {
      window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    }
  });

  function generarTextoWA(pedidos) {
    const DIAS_CORTO = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const MESES_CORTO = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    let txt = `🍞 *Pedido Panfitrión*\n`;
    txt += `📍 ${pedidos[0].cafeteria_nombre}\n\n`;

    pedidos.forEach(pedido => {
      const d = new Date(pedido.fecha_entrega + 'T00:00:00');
      const partes = pedido.fecha_entrega.split('-');
      txt += `📅 *${DIAS_CORTO[d.getDay()]} ${parseInt(partes[2])} de ${MESES_CORTO[parseInt(partes[1])-1]}*\n`;

      const prods = pedido.productos;
      if (prods.length > 0 && prods[0].sucursal) {
        prods.forEach(s => {
          txt += `  *${s.sucursal}*\n`;
          s.items.forEach(i => { txt += `  • ${i.nombre}: ${i.cantidad}\n`; });
        });
      } else {
        prods.forEach(i => { txt += `  • ${i.nombre}: ${i.cantidad}\n`; });
      }
      txt += '\n';
    });

    if (pedidos[0].notas) txt += `📝 ${pedidos[0].notas}`;
    return txt.trim();
  }

  // ── HISTORIAL ──
  btnHistorial.addEventListener('click', async () => {
    drawerContent.innerHTML = '<div class="historial-vacio">Cargando pedidos…</div>';
    drawerOverlay.classList.add('visible');
    drawerHistorial.classList.add('visible');

    await cargarPedidosRecientes();
    renderHistorial();
  });

  function cerrarDrawer() {
    drawerOverlay.classList.remove('visible');
    drawerHistorial.classList.remove('visible');
  }

  btnCerrarDrawer.addEventListener('click', cerrarDrawer);
  drawerOverlay.addEventListener('click', cerrarDrawer);

  function renderHistorial() {
    if (!pedidosExistentes || pedidosExistentes.length === 0) {
      drawerContent.innerHTML = '<div class="historial-vacio">No tienes pedidos en los últimos 15 días.</div>';
      return;
    }

    drawerContent.innerHTML = '';
    pedidosExistentes.forEach(p => {
      const card = document.createElement('div');
      card.className = 'pedido-card';

      const fechaEnvio = new Date(p.fecha);
      const fechaEnvioStr = `${fechaEnvio.getDate()} de ${MESES_ES[fechaEnvio.getMonth()]} — ${String(fechaEnvio.getHours()).padStart(2,'0')}:${String(fechaEnvio.getMinutes()).padStart(2,'0')}`;

      const partes = (p.fecha_entrega || '').split('-');
      const entregaStr = partes.length === 3
        ? `${parseInt(partes[2])} de ${MESES_ES[parseInt(partes[1])-1]}`
        : p.fecha_entrega;

      let productosHTML = '';
      const prods = p.productos || [];

      if (prods.length > 0 && prods[0].sucursal !== undefined) {
        // Formato nuevo con sucursales
        prods.forEach(s => {
          productosHTML += `<div class="pedido-sucursal-nombre">${s.sucursal}</div>`;
          (s.items || []).forEach(i => {
            productosHTML += `<div class="pedido-item"><span class="pedido-cant">${i.cantidad}</span><span>${i.nombre}</span></div>`;
          });
        });
      } else {
        // Formato legacy plano
        prods.forEach(i => {
          productosHTML += `<div class="pedido-item"><span class="pedido-cant">${i.cantidad}</span><span>${i.nombre}</span></div>`;
        });
      }

      const notasHTML = p.notas
        ? `<div class="pedido-notas">📝 ${p.notas}</div>`
        : '';

      card.innerHTML = `
        <div class="pedido-card-header">
          <div class="pedido-fecha-envio">Enviado: ${fechaEnvioStr}</div>
          <div class="pedido-fecha-entrega">Entrega: ${entregaStr}</div>
        </div>
        <div class="pedido-productos">${productosHTML}</div>
        ${notasHTML}
      `;
      drawerContent.appendChild(card);
    });
  }

  // ── ARRANCAR ──
  init();
</script>
</body>
</html>
