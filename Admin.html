<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panfitrión — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --negro: #0a0a0a;
    --negro2: #111111;
    --negro3: #1a1a1a;
    --negro4: #222222;
    --gris1: #2a2a2a;
    --gris2: #3a3a3a;
    --gris3: #555555;
    --gris4: #888888;
    --gris5: #aaaaaa;
    --dorado: #c9a84c;
    --dorado2: #b8963c;
    --dorado3: #e8c97a;
    --blanco: #f5f2eb;
    --blanco2: #e8e4db;
    --sidebar-w: 230px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--negro);
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
  }

  /* ── LOGIN ── */
  .login-screen {
    position: fixed;
    inset: 0;
    background: var(--negro);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 20px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .login-logo {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--dorado);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--negro);
    margin: 0 auto 16px;
  }

  .login-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--blanco);
    margin-bottom: 4px;
  }

  .login-sub {
    font-size: 13px;
    color: var(--gris4);
    margin-bottom: 28px;
  }

  .login-campo {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
    text-align: left;
  }

  .login-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gris4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .login-input {
    background: var(--negro4);
    border: 1px solid var(--gris2);
    border-radius: 10px;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .login-input:focus { border-color: var(--dorado); }

  .btn-login {
    width: 100%;
    background: var(--dorado);
    border: none;
    color: var(--negro);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }

  .btn-login:active { background: var(--dorado2); }

  .login-error {
    color: #e05c5c;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* ── LAYOUT PRINCIPAL ── */
  .app {
    display: none;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
  }

  .app.visible { display: flex; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--negro2);
    border-right: 1px solid var(--gris1);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    height: 100dvh;
  }

  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--gris1);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo-ico {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--dorado);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--negro);
    flex-shrink: 0;
  }

  .sidebar-logo-txt {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--dorado);
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--gris4);
    transition: background 0.12s, color 0.12s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: var(--gris1); color: var(--blanco); }

  .nav-item.activo {
    background: rgba(201,168,76,0.1);
    color: var(--dorado);
  }

  .nav-item-ico { font-size: 16px; }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--gris1);
  }

  .btn-logout {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: 1px solid var(--gris2);
    color: var(--gris4);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
  }

  .btn-logout:hover { background: var(--gris1); color: var(--blanco); }

  /* ── CONTENIDO ── */
  .contenido {
    flex: 1;
    overflow-y: auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .contenido-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--gris1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    background: var(--negro);
    z-index: 10;
  }

  .page-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--blanco);
  }

  .btn-nuevo {
    background: var(--dorado);
    border: none;
    color: var(--negro);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-nuevo:active { background: var(--dorado2); }

  .contenido-body {
    padding: 20px 24px;
    flex: 1;
  }

  /* ── PANEL CAFETERÍAS ── */
  .panel { display: none; }
  .panel.activo { display: block; }

  .cafeterias-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .cafe-card {
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 14px;
    padding: 18px;
    transition: border-color 0.15s;
  }

  .cafe-card:hover { border-color: var(--gris2); }

  .cafe-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .cafe-nombre-card {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--blanco);
    line-height: 1.2;
    flex: 1;
  }

  .cafe-slug-badge {
    font-size: 11px;
    color: var(--gris4);
    background: var(--negro4);
    padding: 2px 8px;
    border-radius: 6px;
    font-family: monospace;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .cafe-link-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    background: var(--negro4);
    border: 1px solid var(--gris1);
    border-radius: 8px;
    padding: 8px 10px;
  }

  .cafe-link-txt {
    flex: 1;
    font-size: 12px;
    color: var(--gris4);
    font-family: monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-copiar, .btn-ir-pedido {
    background: var(--gris1);
    border: none;
    color: var(--blanco);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.1s;
    flex-shrink: 0;
  }

  .btn-copiar:active,
  .btn-ir-pedido:active { background: var(--gris2); }
  .btn-copiar.copiado { color: var(--dorado); }

  .cafe-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 14px;
  }

  .cafe-stat {
    font-size: 12px;
    color: var(--gris4);
  }

  .cafe-stat span {
    color: var(--dorado);
    font-weight: 600;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
  }

  .cafe-card-actions {
    display: flex;
    gap: 8px;
  }

  .btn-accion {
    flex: 1;
    background: var(--negro4);
    border: 1px solid var(--gris2);
    color: var(--gris4);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-accion:hover { background: var(--gris1); color: var(--blanco); }
  .btn-accion.eliminar:hover { color: #e05c5c; border-color: #e05c5c; }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--gris4);
  }

  .empty-state-ico { font-size: 40px; margin-bottom: 12px; }
  .empty-state-txt { font-size: 14px; line-height: 1.6; }

  /* ── PANEL PEDIDOS ── */
  .filtros-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filtro-select, .filtro-input {
    background: var(--negro3);
    border: 1px solid var(--gris2);
    border-radius: 8px;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .filtro-select:focus, .filtro-input:focus { border-color: var(--dorado); }
  .filtro-select { min-width: 160px; cursor: pointer; }
  .filtro-input { min-width: 140px; }

  .btn-limpiar-filtros {
    background: var(--gris1);
    border: 1px solid var(--gris2);
    color: var(--gris4);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
  }

  .btn-limpiar-filtros:hover { background: var(--gris2); color: var(--blanco); }

  .btn-descargar-pdf {
    background: var(--dorado);
    border: none;
    color: var(--negro);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }

  .btn-descargar-pdf:hover { background: var(--dorado2); color: var(--negro); }

  /* ── PANEL PEDIDOS — CARDS ── */
  .fecha-grupo {
    margin-bottom: 28px;
  }

  .fecha-grupo-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .fecha-grupo-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--blanco);
    white-space: nowrap;
  }

  .fecha-grupo-linea {
    flex: 1;
    height: 1px;
    background: var(--gris1);
  }

  .fecha-grupo-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--gris4);
    background: var(--negro3);
    border: 1px solid var(--gris1);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .pedido-card-admin {
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .pedido-card-admin:hover { border-color: var(--gris2); }

  .pedido-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    gap: 12px;
    border-bottom: 1px solid var(--gris1);
    flex-wrap: wrap;
  }

  .pedido-cafe-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.22);
    color: var(--dorado);
    font-size: 13px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    font-family: 'Playfair Display', serif;
  }

  .pedido-meta {
    font-size: 11px;
    color: var(--gris4);
    text-align: right;
    line-height: 1.6;
  }

  .pedido-card-body {
    padding: 14px 16px;
  }

  .pedido-prods-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .prod-tabla {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .prod-tabla th {
    font-size: 10px;
    font-weight: 600;
    color: var(--dorado3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 6px 12px 6px 0;
    border-bottom: 1px solid var(--gris1);
    white-space: nowrap;
    text-align: center;
  }

  .prod-tabla th:first-child { text-align: left; color: var(--gris4); }

  .prod-tabla td {
    padding: 6px 12px 6px 0;
    color: var(--blanco);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    text-align: center;
    vertical-align: middle;
  }

  .prod-tabla td:first-child { text-align: left; color: var(--gris5); }
  .prod-tabla tr:last-child td { border-bottom: none; }

  .prod-tabla .prod-cant-cell {
    color: var(--dorado);
    font-weight: 700;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
  }

  .prod-tabla .prod-cero { color: var(--gris2); }

  .prod-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--blanco);
    line-height: 1.8;
  }

  .prod-cant {
    color: var(--dorado);
    font-weight: 700;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    min-width: 22px;
  }

  .pedido-notas-admin {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--gris1);
    font-size: 12px;
    color: var(--gris4);
    font-style: italic;
    line-height: 1.5;
  }

  /* ── MODAL CAFETERÍA ── */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-bg.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal-form {
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    max-height: 90dvh;
    display: flex;
    flex-direction: column;
    transform: scale(0.95);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  .modal-bg.visible .modal-form {
    transform: scale(1);
  }

  .modal-form-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--gris1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .modal-form-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--blanco);
  }

  .btn-cerrar-mf {
    background: var(--gris1);
    border: none;
    color: var(--gris4);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }

  .btn-cerrar-mf:hover { background: var(--gris2); }

  .modal-form-body {
    overflow-y: auto;
    padding: 20px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-grupo {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gris4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .form-input {
    background: var(--negro4);
    border: 1px solid var(--gris2);
    border-radius: 10px;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .form-input:focus { border-color: var(--dorado); }
  .form-input::placeholder { color: var(--gris3); }

  .lista-items {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .item-fila {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .item-input {
    flex: 1;
    background: var(--negro4);
    border: 1px solid var(--gris2);
    border-radius: 8px;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .item-input:focus { border-color: var(--dorado); }
  .item-input::placeholder { color: var(--gris3); }

  .btn-quitar {
    background: none;
    border: 1px solid var(--gris2);
    color: var(--gris4);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.1s, color 0.1s;
  }

  .btn-quitar:hover { background: var(--gris1); color: #e05c5c; }

  .btn-agregar-item {
    background: none;
    border: 1px dashed var(--gris2);
    color: var(--gris4);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.1s, color 0.1s;
    margin-top: 4px;
  }

  .btn-agregar-item:hover { border-color: var(--dorado); color: var(--dorado); }


  .modal-form-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--gris1);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn-cancelar {
    flex: 1;
    background: var(--gris1);
    border: 1px solid var(--gris2);
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.12s;
  }

  .btn-cancelar:hover { background: var(--gris2); }

  .btn-guardar {
    flex: 2;
    background: var(--dorado);
    border: none;
    color: var(--negro);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.12s;
  }

  .btn-guardar:active { background: var(--dorado2); }
  .btn-guardar:disabled { background: var(--gris2); color: var(--gris4); cursor: not-allowed; }

  /* ── MODAL CONFIRMACIÓN ELIMINAR ── */
  .confirm-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .confirm-bg.visible { opacity: 1; pointer-events: all; }

  .confirm-card {
    background: var(--negro3);
    border: 1px solid var(--gris1);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 320px;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.2s;
  }

<script>

  const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0dGRybmZ0eG1kcW5mYXVoa2twIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjI5NzUsImV4cCI6MjA5MDUzODk3NX0.1NiCaHaEZPsa85cbZVC1iAxDu1FbQ7tiM-VBt_e68Qk';
  const ADMIN_USUARIO  = 'admin';
  const ADMIN_PASSWORD = 'panfitron2024';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── ESTADO ──
  let cafeterias = [];
  let pedidos    = [];
  let editandoId = null;
  let pendingDeleteId = null;
  let panelActivo = 'cafeterias'; // 'cafeterias' | 'pedidos'

  // ── ELEMENTOS ──
  const loginScreen    = document.getElementById('loginScreen');
  const appMain        = document.getElementById('appMain');
  const inputUsuario   = document.getElementById('inputUsuario');
  const inputPassword  = document.getElementById('inputPassword');
  const btnLogin       = document.getElementById('btnLogin');
  const loginError     = document.getElementById('loginError');
  const navCafeterias  = document.getElementById('navCafeterias');
  const navPedidos     = document.getElementById('navPedidos');
  const btnLogout      = document.getElementById('btnLogout');
  const panelCafeEl    = document.getElementById('panelCafeterias');
  const panelPedidosEl = document.getElementById('panelPedidos');
  const pageTituloEl   = document.getElementById('pageTitulo');
  const btnNuevaCafe   = document.getElementById('btnNuevaCafe');
  const cafeteriasGrid = document.getElementById('cafeteriasGrid');
  const filtroCafeEl   = document.getElementById('filtroCafe');
  const filtroFechaEl  = document.getElementById('filtroFecha');
  const btnDescargarPDF = document.getElementById('btnDescargarPDF');
  const btnLimpiarFil  = document.getElementById('btnLimpiarFiltros');
  const pedidosList    = document.getElementById('pedidosList');
  const modalCafeEl    = document.getElementById('modalCafe');
  const modalCafeTit   = document.getElementById('modalCafeTitulo');
  const cafNombreEl    = document.getElementById('cafNombre');
  const cafSlugEl      = document.getElementById('cafSlug');
  const listaProductosEl = document.getElementById('listaProductos');
  const listaSucursalesEl = document.getElementById('listaSucursales');
  const btnAgregarProd = document.getElementById('btnAgregarProducto');
  const btnAgregarSuc  = document.getElementById('btnAgregarSucursal');
  const btnGuardarCafe = document.getElementById('btnGuardarCafe');
  const btnCancelarCafe = document.getElementById('btnCancelarCafe');
  const btnCerrarMF    = document.getElementById('btnCerrarModalCafe');
  const confirmBgEl    = document.getElementById('confirmBg');
  const confirmMsgEl   = document.getElementById('confirmMsg');
  const btnConfirmOk   = document.getElementById('btnConfirmOk');
  const btnConfirmCancel = document.getElementById('btnConfirmCancel');
  const toastEl        = document.getElementById('toast');

  // ── LOGIN ──
  function verificarSesion() {
    const sess = sessionStorage.getItem('panfitron_admin');
    if (sess === '1') {
      loginScreen.style.display = 'none';
      appMain.classList.add('visible');
      cargarTodo();
    }
  }

  btnLogin.addEventListener('click', () => {
    const u = inputUsuario.value.trim();
    const p = inputPassword.value;
    if (u === ADMIN_USUARIO && p === ADMIN_PASSWORD) {
      loginError.style.display = 'none';
      sessionStorage.setItem('panfitron_admin', '1');
      loginScreen.style.display = 'none';
      appMain.classList.add('visible');
      cargarTodo();
    } else {
      loginError.style.display = 'block';
      inputPassword.value = '';
    }
  });

  inputPassword.addEventListener('keydown', e => {
    if (e.key === 'Enter') btnLogin.click();
  });

  btnLogout.addEventListener('click', () => {
    sessionStorage.removeItem('panfitron_admin');
    location.reload();
  });

  // ── NAVEGACIÓN ──
  navCafeterias.addEventListener('click', () => cambiarPanel('cafeterias'));
  navPedidos.addEventListener('click', () => cambiarPanel('pedidos'));

  function cambiarPanel(nombre) {
    panelActivo = nombre;
    navCafeterias.classList.toggle('activo', nombre === 'cafeterias');
    navPedidos.classList.toggle('activo', nombre === 'pedidos');
    panelCafeEl.classList.toggle('activo', nombre === 'cafeterias');
    panelPedidosEl.classList.toggle('activo', nombre === 'pedidos');
    pageTituloEl.textContent = nombre === 'cafeterias' ? 'Cafeterías' : 'Pedidos';
    btnNuevaCafe.style.display = nombre === 'cafeterias' ? '' : 'none';
  }

  // ── CARGA INICIAL ──
  async function cargarTodo() {
    await Promise.all([cargarCafeterias(), cargarPedidos()]);
  }

  async function cargarCafeterias() {
    const { data } = await db.from('cafeterias').select('*').order('created_at', { ascending: false });
    cafeterias = data || [];
    renderCafeterias();
    poblarFiltroCafeterias();
  }

  async function cargarPedidos() {
    const { data } = await db.from('pedidos').select('*').order('fecha', { ascending: false });
    pedidos = data || [];
    renderPedidos();
  }

  // ── RENDER CAFETERÍAS ──
  function renderCafeterias() {
    cafeteriasGrid.innerHTML = '';
    if (cafeterias.length === 0) {
      cafeteriasGrid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-ico">🏪</div>
          <div class="empty-state-txt">No hay cafeterías registradas.<br>Agrega la primera.</div>
        </div>`;
      return;
    }

    const URL_BASE = window.location.href
      .split('?')[0]
      .replace(/\/[^\/]*$/, '') + '/index.html';

    cafeterias.forEach(c => {
      const link = `${URL_BASE}?cafe=${c.slug}`;
      const menu = c.menu || [];
      const sucursales = c.sucursales || [];

      const card = document.createElement('div');
      card.className = 'cafe-card';
      card.innerHTML = `
        <div class="cafe-card-header">
          <div class="cafe-nombre-card">${c.nombre}</div>
          <div class="cafe-slug-badge">${c.slug}</div>
        </div>
        <div class="cafe-link-row">
          <div class="cafe-link-txt" title="${link}">${link}</div>
          <button class="btn-copiar" data-link="${link}">Copiar</button>
        </div>
        <div class="cafe-stats">
          <div class="cafe-stat"><span>${menu.length}</span> productos</div>
          ${sucursales.length > 0 ? `<div class="cafe-stat"><span>${sucursales.length}</span> sucursales</div>` : ''}
        </div>
        <div class="cafe-card-actions">
          <button class="btn-accion editar" data-id="${c.id}">✏️ Editar</button>
          <button class="btn-accion eliminar" data-id="${c.id}" data-nombre="${c.nombre}">🗑️ Eliminar</button>
        </div>
      `;

      card.querySelector('.btn-copiar').addEventListener('click', (e) => {
        const btn = e.currentTarget;
        navigator.clipboard.writeText(btn.dataset.link).then(() => {
          btn.textContent = '✓ Copiado';
          btn.classList.add('copiado');
          setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copiado'); }, 2000);
        });
      });

      const irBtn = document.createElement('button');
      irBtn.className = 'btn-ir-pedido';
      irBtn.textContent = 'Ir a pedido';
      irBtn.style.marginLeft = '8px';
      irBtn.addEventListener('click', () => window.open(link, '_blank', 'noopener'));
      card.querySelector('.cafe-link-row').appendChild(irBtn);

      card.querySelector('.editar').addEventListener('click', () => abrirEditarCafe(c.id));
      card.querySelector('.eliminar').addEventListener('click', () => confirmarEliminar(c.id, c.nombre));

      cafeteriasGrid.appendChild(card);
    });
  }

  // ── MODAL CAFETERÍA ──
  function abrirNuevaCafe() {
    editandoId = null;
    cafNombreEl.value = '';
    cafSlugEl.value = '';
    listaProductosEl.innerHTML = '';
    listaSucursalesEl.innerHTML = '';
    modalCafeTit.textContent = 'Nueva cafetería';
    modalCafeEl.classList.add('visible');
    cafNombreEl.focus();
  }

  function abrirEditarCafe(id) {
    const c = cafeterias.find(x => x.id === id);
    if (!c) return;
    editandoId = id;
    cafNombreEl.value = c.nombre;
    cafSlugEl.value   = c.slug;

    listaProductosEl.innerHTML = '';
    (c.menu || []).forEach(p => agregarFilaProducto(p.nombre));

    listaSucursalesEl.innerHTML = '';
    (c.sucursales || []).forEach(s => agregarFilaSucursal(s));

    modalCafeTit.textContent = 'Editar cafetería';
    modalCafeEl.classList.add('visible');
  }

  function cerrarModalCafe() {
    modalCafeEl.classList.remove('visible');
    editandoId = null;
  }

  btnNuevaCafe.addEventListener('click', abrirNuevaCafe);
  btnCerrarMF.addEventListener('click', cerrarModalCafe);
  btnCancelarCafe.addEventListener('click', cerrarModalCafe);

  modalCafeEl.addEventListener('click', (e) => {
    if (e.target === modalCafeEl) cerrarModalCafe();
  });

  // Auto-slug
  cafNombreEl.addEventListener('input', () => {
    if (!editandoId) {
      cafSlugEl.value = generarSlug(cafNombreEl.value);
    }
  });

  cafSlugEl.addEventListener('input', () => {
    cafSlugEl.value = cafSlugEl.value
      .toLowerCase()
      .replace(/\s+/g, '-')
      .replace(/[^a-z0-9-]/g, '');
  });

  function generarSlug(txt) {
    return txt
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, '-')
      .replace(/[^a-z0-9-]/g, '')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
  }

  // Filas de productos
  function agregarFilaProducto(nombre) {
    const fila = document.createElement('div');
    fila.className = 'item-fila';
    fila.innerHTML = `
      <input class="item-input" type="text" placeholder="Nombre del producto" value="${nombre || ''}">
      <button class="btn-quitar">×</button>
    `;
    fila.querySelector('.btn-quitar').addEventListener('click', () => fila.remove());
    listaProductosEl.appendChild(fila);
    fila.querySelector('.item-input').focus();
  }

  function agregarFilaSucursal(valor) {
    const fila = document.createElement('div');
    fila.className = 'item-fila';
    fila.innerHTML = `
      <input class="item-input" type="text" placeholder="Nombre de la sucursal" value="${valor || ''}">
      <button class="btn-quitar">×</button>
    `;
    fila.querySelector('.btn-quitar').addEventListener('click', () => fila.remove());
    listaSucursalesEl.appendChild(fila);
    fila.querySelector('input').focus();
  }

  btnAgregarProd.addEventListener('click', () => agregarFilaProducto(''));
  btnAgregarSuc.addEventListener('click', () => agregarFilaSucursal(''));

  // Guardar cafetería
  btnGuardarCafe.addEventListener('click', async () => {
    const nombre = cafNombreEl.value.trim();
    const slug   = cafSlugEl.value.trim();
    if (!nombre) { toast('El nombre es requerido.'); return; }
    if (!slug)   { toast('El slug es requerido.'); return; }

    const menu = Array.from(listaProductosEl.querySelectorAll('.item-fila'))
      .map(fila => fila.querySelector('.item-input').value.trim())
      .filter(nombre => nombre)
      .map(nombre => ({ id: 'p' + Math.random().toString(36).slice(2,8), nombre }));

    // Mantener IDs existentes al editar
    if (editandoId) {
      const cafeActual = cafeterias.find(c => c.id === editandoId);
      if (cafeActual) {
        const menuActual = cafeActual.menu || [];
        const menuFinal = menu.map(np => {
          const existe = menuActual.find(ep => ep.nombre === np.nombre);
          return existe ? { ...existe } : np;
        });
        menu.length = 0;
        menuFinal.forEach(p => menu.push(p));
      }
    }

    const sucursales = Array.from(listaSucursalesEl.querySelectorAll('.item-input'))
      .map(i => i.value.trim())
      .filter(Boolean);

    btnGuardarCafe.disabled = true;
    btnGuardarCafe.textContent = 'Guardando…';

    let error;
    if (editandoId) {
      ({ error } = await db
        .from('cafeterias')
        .update({ nombre, slug, menu, sucursales })
        .eq('id', editandoId)
        .select());
    } else {
      ({ error } = await db
        .from('cafeterias')
        .insert([{ nombre, slug, menu, sucursales, created_at: new Date().toISOString() }])
        .select());
    }

    btnGuardarCafe.disabled = false;
    btnGuardarCafe.textContent = 'Guardar cafetería';

    if (error) {
      const esSlugDuplicado = error.code === '23505' || (error.message || '').includes('slug') || (error.details || '').includes('slug');
      const msg = esSlugDuplicado
        ? 'El slug ya está en uso, elige uno diferente.'
        : ('Error al guardar: ' + (error.message || error.details || 'Intenta de nuevo.'));
      toast(msg);
      return;
    }

    toast(editandoId ? 'Cafetería actualizada.' : 'Cafetería creada.');
    cerrarModalCafe();
    await cargarCafeterias();
  });

  // ── ELIMINAR ──
  function confirmarEliminar(id, nombre) {
    pendingDeleteId = id;
    confirmMsgEl.textContent = `¿Seguro que quieres eliminar "${nombre}"? Esta acción no se puede deshacer.`;
    confirmBgEl.classList.add('visible');
  }

  btnConfirmCancel.addEventListener('click', () => {
    confirmBgEl.classList.remove('visible');
    pendingDeleteId = null;
  });

  btnConfirmOk.addEventListener('click', async () => {
    if (!pendingDeleteId) return;
    btnConfirmOk.disabled = true;
    btnConfirmOk.textContent = 'Eliminando…';

    // Borrar pedidos primero (por si el CASCADE aún no está activo en la BD)
    await db.from('pedidos').delete().eq('cafeteria_id', pendingDeleteId);

    const { error } = await db.from('cafeterias').delete().eq('id', pendingDeleteId);
    confirmBgEl.classList.remove('visible');
    btnConfirmOk.disabled = false;
    btnConfirmOk.textContent = 'Eliminar';

    if (error) { toast('Error al eliminar: ' + (error.message || '')); return; }
    toast('Cafetería eliminada.');
    pendingDeleteId = null;
    await cargarCafeterias();
  });

  // ── RENDER PEDIDOS ──
  function poblarFiltroCafeterias() {
    const opciones = cafeterias.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
    filtroCafeEl.innerHTML = `<option value="">Todas las cafeterías</option>${opciones}`;
  }

  function renderPedidos() {
    let lista = [...pedidos];

    const cafeFiltro  = filtroCafeEl.value;
    const fechaFiltro = filtroFechaEl.value;

    if (cafeFiltro)  lista = lista.filter(p => p.cafeteria_id === cafeFiltro);
    if (fechaFiltro) lista = lista.filter(p => p.fecha_entrega === fechaFiltro);

    pedidosList.innerHTML = '';

    if (lista.length === 0) {
      pedidosList.innerHTML = `<div class="empty-state" style="padding:40px">
        <div class="empty-state-ico">📋</div>
        <div class="empty-state-txt">No hay pedidos con estos filtros.</div>
      </div>`;
      return;
    }

    const DIAS_ES  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const MESES_ES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const MESES_LARGO = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    // Agrupar por fecha_entrega (más próxima primero)
    const grupos = {};
    lista.forEach(p => {
      const k = p.fecha_entrega || 'sin-fecha';
      if (!grupos[k]) grupos[k] = [];
      grupos[k].push(p);
    });

    const fechasOrdenadas = Object.keys(grupos).sort();

    const hoy = new Date();
    hoy.setHours(0,0,0,0);

    fechasOrdenadas.forEach(fechaKey => {
      const pedidosDelDia = grupos[fechaKey];
      const partes = fechaKey.split('-');
      let tituloFecha = fechaKey;
      let etiqueta = '';

      if (partes.length === 3) {
        const d = new Date(parseInt(partes[0]), parseInt(partes[1])-1, parseInt(partes[2]));
        d.setHours(0,0,0,0);
        const diff = Math.round((d - hoy) / 86400000);
        const diaNum = parseInt(partes[2]);
        const mesNombre = MESES_LARGO[parseInt(partes[1])-1];
        const diaSemana = DIAS_ES[d.getDay()];

        tituloFecha = `${diaSemana} ${diaNum} de ${mesNombre}`;

        if (diff === 0) etiqueta = 'Hoy';
        else if (diff === 1) etiqueta = 'Mañana';
        else if (diff === -1) etiqueta = 'Ayer';
        else if (diff < 0) etiqueta = `Hace ${Math.abs(diff)} días`;
        else etiqueta = `En ${diff} días`;
      }

      // Encabezado del grupo
      const grupoEl = document.createElement('div');
      grupoEl.className = 'fecha-grupo';

      grupoEl.innerHTML = `
        <div class="fecha-grupo-header">
          <div class="fecha-grupo-titulo">${tituloFecha}</div>
          <div class="fecha-grupo-linea"></div>
          ${etiqueta ? `<div class="fecha-grupo-badge">${etiqueta}</div>` : ''}
          <div class="fecha-grupo-badge">${pedidosDelDia.length} pedido${pedidosDelDia.length !== 1 ? 's' : ''}</div>
        </div>
      `;

      // Cards de pedidos del día
      pedidosDelDia.forEach(p => {
        const card = document.createElement('div');
        card.className = 'pedido-card-admin';

        const fe = new Date(p.fecha);
        const envioStr = `Enviado ${fe.getDate()} ${MESES_ES[fe.getMonth()]} · ${String(fe.getHours()).padStart(2,'0')}:${String(fe.getMinutes()).padStart(2,'0')}`;

        // Construir productos
        const prods = p.productos || [];
        let prodsHTML = '';

        if (prods.length > 0 && prods[0].sucursal !== undefined) {
          const sucursalNames = prods.map(s => s.sucursal);
          const productosMap = {};
          prods.forEach(s => {
            (s.items || []).forEach(i => {
              if (!productosMap[i.nombre]) productosMap[i.nombre] = {};
              productosMap[i.nombre][s.sucursal] = i.cantidad;
            });
          });
          const headerCols = sucursalNames.map(s => `<th>${s}</th>`).join('');
          const bodyRows = Object.keys(productosMap).map(nombre => {
            const celdas = sucursalNames.map(s => {
              const cant = productosMap[nombre][s];
              return cant ? `<td class="prod-cant-cell">${cant}</td>` : `<td class="prod-cero">—</td>`;
            }).join('');
            return `<tr><td>${nombre}</td>${celdas}</tr>`;
          }).join('');
          prodsHTML = `<div class="pedido-prods-wrap"><table class="prod-tabla">
            <thead><tr><th>Producto</th>${headerCols}</tr></thead>
            <tbody>${bodyRows}</tbody>
          </table></div>`;
        } else {
          prodsHTML = prods.map(i =>
            `<div class="prod-item"><span class="prod-cant">${i.cantidad}</span><span>${i.nombre}</span></div>`
          ).join('');
        }

        const notasHTML = p.notas
          ? `<div class="pedido-notas-admin">📝 ${p.notas}</div>`
          : '';

        card.innerHTML = `
          <div class="pedido-card-top">
            <div class="pedido-cafe-badge">🏪 ${p.cafeteria_nombre || '—'}</div>
            <div class="pedido-meta">${envioStr}</div>
          </div>
          <div class="pedido-card-body">
            ${prodsHTML}
            ${notasHTML}
          </div>
        `;

        grupoEl.appendChild(card);
      });

      pedidosList.appendChild(grupoEl);
    });
  }

  filtroCafeEl.addEventListener('change', renderPedidos);
  filtroFechaEl.addEventListener('change', renderPedidos);
  btnDescargarPDF.addEventListener('click', generarPDFPedidosDia);
  btnLimpiarFil.addEventListener('click', () => {
    filtroCafeEl.value = '';
    filtroFechaEl.value = '';
    renderPedidos();
  });

  // ── GENERAR PDF ──
  function generarPDFPedidosDia() {
    const fecha = filtroFechaEl.value;
    if (!fecha) {
      toast('Selecciona primero un día para generar el PDF.');
      return;
    }

    const pedidosDia = pedidos.filter(p => p.fecha_entrega === fecha);
    if (pedidosDia.length === 0) {
      toast('No hay pedidos para la fecha seleccionada.');
      return;
    }

    const pedidosPorCafe = pedidosDia.reduce((acc, pedido) => {
      const nombre = pedido.cafeteria_nombre || 'Sin cafetería';
      if (!acc[nombre]) acc[nombre] = [];
      acc[nombre].push(pedido);
      return acc;
    }, {});

    const { jsPDF } = window.jspdf || {};
    if (!jsPDF) {
      toast('No se pudo cargar la librería PDF.');
      return;
    }

    const doc = new jsPDF({ unit: 'pt', format: 'a4' });
    const margen = 40;
    const anchoUtil = 595.28 - margen * 2;
    let y = 48;

    const fechaObj = new Date(fecha + 'T00:00:00');
    const tituloFecha = fechaObj.toLocaleDateString('es-ES', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text(`Pedidos del día ${tituloFecha}`, margen, y);
    y += 26;

    const MESES_ES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

    Object.keys(pedidosPorCafe).sort().forEach(cafeNombre => {
      if (y > 740) { doc.addPage(); y = 48; }
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(14);
      doc.text(`Cafetería: ${cafeNombre}`, margen, y);
      y += 20;

      pedidosPorCafe[cafeNombre].forEach(pedido => {
        if (y > 760) { doc.addPage(); y = 48; }

        const fechaEnvio = pedido.fecha ? new Date(pedido.fecha) : null;
        const envioTexto = fechaEnvio
          ? `Enviado ${String(fechaEnvio.getDate()).padStart(2,'0')} ${MESES_ES[fechaEnvio.getMonth()]} · ${String(fechaEnvio.getHours()).padStart(2,'0')}:${String(fechaEnvio.getMinutes()).padStart(2,'0')}`
          : '';

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(12);
        const tituloPedido = `Pedido ${pedido.id || ''} ${envioTexto}`.trim();
        const tituloLines = doc.splitTextToSize(tituloPedido, anchoUtil);
        doc.text(tituloLines, margen, y);
        y += tituloLines.length * 14;

        const productos = pedido.productos || [];
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(11);
        if (productos.length > 0) {
          productos.forEach(item => {
            if (y > 760) { doc.addPage(); y = 48; }
            const linea = `• ${item.cantidad} x ${item.nombre}`;
            const texto = doc.splitTextToSize(linea, anchoUtil - 20);
            doc.text(texto, margen + 10, y);
            y += texto.length * 14;
          });
        } else {
          if (y > 760) { doc.addPage(); y = 48; }
          doc.text('• Sin productos registrados', margen + 10, y);
          y += 14;
        }

        if (pedido.notas) {
          if (y > 740) { doc.addPage(); y = 48; }
          const notas = doc.splitTextToSize(`Notas: ${pedido.notas}`, anchoUtil - 20);
          doc.text(notas, margen + 10, y);
          y += notas.length * 14;
        }

        y += 12;
      });

      y += 12;
    });

    const archivo = `pedidos-${fecha}.pdf`;
    doc.save(archivo);
    toast(`PDF generado para ${fecha}.`);
  }

  // ── TOAST ──
  let toastTimer;
  function toast(msg, dur=2800) {
    toastEl.textContent = msg;
    toastEl.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('visible'), dur);
  }

  // ── ARRANCAR ──
  verificarSesion();
</script>
